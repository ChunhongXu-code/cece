<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --card: #1c1c24;
    --border: #2a2a36;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --muted: #7a7a92;
    --yellow: #f7d96a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ── COVER ── */
  #cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 0;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 24px;
    opacity: 0.9;
  }

  .cover-title {
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  .cover-title .highlight {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cover-sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .cover-stats {
    display: flex;
    gap: 28px;
    justify-content: center;
    margin-bottom: 44px;
  }

  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 900;
    color: var(--accent3);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(124,106,247,0.35);
    font-family: inherit;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,106,247,0.45); }
  .btn-start:active { transform: translateY(0); }

  .cover-disclaimer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── QUIZ ── */
  #quiz { display: none; }

  .progress-bar-wrap {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-meta span:last-child { color: var(--accent); font-weight: 700; }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .question-card {
    animation: slideIn 0.28s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
    white-space: pre-line;
  }

  .q-context {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
    white-space: pre-line;
    font-style: italic;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 15px 18px;
    border-radius: 12px;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }

  .opt-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.15s;
  }

  .opt-btn:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .opt-btn:hover::before { opacity: 0.07; }

  .opt-btn.selected {
    border-color: var(--accent);
    background: rgba(124,106,247,0.15);
    color: #fff;
    transform: translateX(6px);
    pointer-events: none;
  }

  .opt-btn .opt-text { position: relative; z-index: 1; }

  /* ── RESULT ── */
  #result { display: none; text-align: center; padding: 40px 0; }

  .result-eyebrow {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .result-type-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    background: rgba(124,106,247,0.15);
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  .result-name {
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 28px;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: left;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }

  .result-desc {
    font-size: 16px;
    line-height: 2;
    color: var(--text);
    white-space: pre-line;
  }

  .result-desc .em {
    color: var(--accent2);
    font-weight: 700;
  }
  .result-desc .num {
    color: var(--accent3);
    font-weight: 900;
    font-size: 18px;
  }
  .result-desc .quote {
    display: block;
    margin: 12px 0;
    padding: 10px 16px;
    background: rgba(124,106,247,0.1);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--muted);
    font-size: 15px;
  }

  .compatibility {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .compat-title {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .compat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .compat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .compat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .share-section { margin-bottom: 28px; }
  .share-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.8;
  }

  .share-hint strong { color: var(--yellow); }

  .wechat-box {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;

  .wechat-label {
    font-size: 13px;
    color: var(--muted);
  }
  .wechat-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent3);
  }
  .keyword-pill {
    background: rgba(246,106,138,0.15);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .wechat-tip {
    font-size: 12px;
    color: var(--muted);
  }

  .btn-retry {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    margin-top: 8px;
  }
  .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SCORE BAR ── */
  .score-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .score-title {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .score-label {
    width: 58px;
    color: var(--muted);
    flex-shrink: 0;
    font-size: 11px;
  }
  .score-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }
  .score-val {
    width: 28px;
    text-align: right;
    color: var(--muted);
    font-size: 11px;
  }

  @media (max-width: 480px) {
    .cover-stats { gap: 20px; }
    .stat-num { font-size: 22px; }
    .q-text { font-size: 17px; }
    .opt-btn { font-size: 14px; padding: 13px 16px; }
  }
</style>
</head>

let shuffledQuestions = [];
let current = 0;
let scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0 };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // Shuffle questions and each question's options
  shuffledQuestions = shuffle(QUESTIONS_RAW).map(q => ({
    ...q,
    opts: shuffle(q.opts)
  }));
  scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0 };
  current = 0;

  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = shuffledQuestions[current];
  const total = shuffledQuestions.length;
  const pct = Math.round((current / total) * 100);

  document.getElementById('prog-text').textContent = `第 ${current + 1} 题 / 共 ${total} 题`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  const area = document.getElementById('question-area');
  area.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'question-card';

  let html = `<div class="q-number">Q${String(current + 1).padStart(2, '0')}</div>`;
  if (q.context) html += `<div class="q-context">${q.context}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  html += `<div class="options">`;
  q.opts.forEach((opt, i) => {
    html += `<button class="opt-btn" onclick="choose(${i})">
      <span class="opt-text">${opt.text}</span>
    </button>`;
  });
  html += `</div>`;
  card.innerHTML = html;
  area.appendChild(card);
}

function choose(idx) {
  const q = shuffledQuestions[current];
  const opt = q.opts[idx];

  // Highlight selected
  const btns = document.querySelectorAll('.opt-btn');
  btns[idx].classList.add('selected');

  // Add scores
  for (const [k, v] of Object.entries(opt.scores || {})) {
    scores[k] = (scores[k] || 0) + v;
  }

  // Advance with short delay
  setTimeout(() => {
    current++;
    if (current < shuffledQuestions.length) {
      renderQuestion();
      // Smooth scroll to top of quiz area
      document.getElementById('quiz').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      showResult();
    }
  }, 320);
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';

  // Find winner
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const type = TYPES[winner];

  // Score bars
  const maxScore = Math.max(...Object.values(scores));
  const barColors = {
    A:'#7c6af7', B:'#f76a8a', C:'#6af7c8',
    D:'#f7d96a', E:'#fa9f6a', F:'#6aaaf7', G:'#c86af7'
  };

  let barRows = '';
  const scoreOrder = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  scoreOrder.forEach(([k, v]) => {
    const pct = maxScore > 0 ? Math.round((v / maxScore) * 100) : 0;
    barRows += `<div class="score-row">
      <span class="score-label">${TYPES[k].name.replace('型','')}</span>
      <div class="score-track"><div class="score-bar" style="width:${pct}%;background:${barColors[k]}"></div></div>
      <span class="score-val">${v}分</span>
    </div>`;
  });

  resultEl.innerHTML = `
    <div class="result-eyebrow">鉴定结果</div>
    <div class="result-type-badge">TYPE ${winner} · RGTI</div>
    <div class="result-name" style="color:${type.color}">${type.name}</div>

    <div class="result-card">
      <div class="result-desc">${type.desc}</div>
    </div>

    <div class="score-breakdown">
      <div class="score-title">📊 你的科研人格光谱</div>
      ${barRows}
    </div>

    <div class="compatibility">
      <div class="compat-title">🔬 人格兼容性分析</div>
      <div class="compat-grid">
        <div class="compat-item">
          <div class="compat-dot" style="background:#6af7c8"></div>
          <span style="color:var(--muted)">最配：</span>&nbsp;${type.compat.good}
        </div>
        <div class="compat-item">
          <div class="compat-dot" style="background:#f76a8a"></div>
          <span style="color:var(--muted)">慎选：</span>&nbsp;${type.compat.bad}
        </div>
      </div>
    </div>

    <div class="share-section">
      <p class="share-hint">
        截图发朋友圈 or 实验室群，<br>
        看看你们实验室都是哪种科研生物 🧬<br><br>
        想测试更多？关注 <strong>JoyCece公众号</strong><br>
        后台回复关键词 <strong>「学术」</strong> 获取测试链接
      </p>
      <div class="wechat-box">
        <div class="wechat-label">🎁 更多测试 · 免费获取</div>
        <div class="wechat-name">JoyCece公众号</div>
        <div class="keyword-pill">回复「学术」</div>
        <div class="wechat-tip">👆 关注后发送关键词即可</div>
      </div>
    </div>

    <button class="btn-retry" onclick="retryQuiz()">↩ 再测一次</button>
  `;

  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function retryQuiz() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });

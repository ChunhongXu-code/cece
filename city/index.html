<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测适合你的城市 - JoyCece</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #43e97b, #38f9d7, #00b894, #00cec9);
        }

        /* 开始页 */
        .start-page { text-align: center; padding: 30px 0; }

        .start-page .icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .start-page h1 {
            font-size: 2em;
            color: #2d3436;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .start-page .subtitle {
            color: #636e72;
            font-size: 1.05em;
            margin-bottom: 28px;
            line-height: 1.8;
        }

        .info-box {
            background: #f0faf6;
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 28px;
            border-left: 4px solid #00b894;
        }

        .info-box h4 {
            color: #00b894;
            font-size: 0.95em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-box p {
            color: #636e72;
            font-size: 0.88em;
            line-height: 1.8;
        }

        .dimension-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }

        .dim-item {
            background: #f8fcfa;
            border-radius: 10px;
            padding: 14px;
            text-align: left;
            border: 1px solid #e8f5ee;
        }

        .dim-item .num {
            color: #00b894;
            font-size: 0.72em;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .dim-item .name {
            color: #2d3436;
            font-size: 0.9em;
            font-weight: 500;
        }

        .start-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,184,148,0.35);
            font-weight: 500;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,184,148,0.45);
        }

        .disclaimer {
            margin-top: 20px;
            color: #b2bec3;
            font-size: 0.78em;
            line-height: 1.6;
        }

        /* 进度条 */
        .progress-container { margin-bottom: 28px; }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.88em;
            color: #636e72;
        }

        .progress-bar {
            height: 6px;
            background: #e8f5ee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .dim-tag {
            display: inline-block;
            background: #e8f5ee;
            color: #00b894;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.78em;
            margin-bottom: 18px;
            font-weight: 500;
        }

        /* 答题页 */
        .question-page { display: none; }

        .question-scenario {
            color: #636e72;
            font-size: 0.9em;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .question-text {
            font-size: 1.15em;
            color: #2d3436;
            margin-bottom: 26px;
            line-height: 1.7;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #e8f5ee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.98em;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
        }

        .option:hover {
            border-color: #55efc4;
            background: #f8fcfa;
        }

        .option.selected {
            border-color: #00b894;
            background: #f0faf6;
            font-weight: 500;
        }

        .option-radio {
            width: 22px;
            height: 22px;
            border: 2px solid #b2bec3;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            transition: all 0.25s;
        }

        .option.selected .option-radio {
            border-color: #00b894;
        }

        .option.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            background: #00b894;
            border-radius: 50%;
        }

        .option-text { flex: 1; }

        .auto-next-hint {
            text-align: center;
            color: #00b894;
            font-size: 0.85em;
            margin-top: -16px;
            margin-bottom: 18px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .auto-next-hint.show { opacity: 1; }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 0.98em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-prev {
            background: #f1f5f9;
            color: #636e72;
        }

        .btn-prev:hover {
            background: #e2e8f0;
        }

        .btn-next {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
        }

        .btn-next:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 加载 */
        .loading-page { display: none; text-align: center; padding: 60px 0; }

        .loading-spinner {
            width: 56px; height: 56px;
            border: 4px solid #e8f5ee;
            border-top: 4px solid #00b894;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: #636e72; font-size: 1.05em; }

        /* 付费墙 */
        .paywall-page { display: none; text-align: center; padding: 20px 0; }

        .paywall-page h2 {
            font-size: 1.6em;
            color: #2d3436;
            margin-bottom: 12px;
        }

        .paywall-page .subtitle {
            color: #636e72;
            margin-bottom: 24px;
            font-size: 1em;
        }

        .paywall-preview {
            background: #f0faf6;
            border-radius: 16px;
            padding: 28px 24px;
            margin: 20px 0;
            border: 1px solid #e8f5ee;
        }

        .preview-city-name {
            font-size: 1.6em;
            font-weight: bold;
            color: #00b894;
            margin-bottom: 8px;
        }

        .preview-desc {
            color: #636e72;
            font-size: 0.92em;
            line-height: 1.7;
        }

        .paywall-lock {
            font-size: 2.5em;
            margin: 20px 0 10px;
            color: #55efc4;
        }

        .paywall-price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 18px 0;
        }

        .price-original {
            color: #b2bec3;
            text-decoration: line-through;
            font-size: 1em;
        }

        .price-current {
            color: #e74c3c;
            font-size: 2em;
            font-weight: bold;
        }

        .price-tag {
            background: #e74c3c;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
        }

        .paywall-features {
            text-align: left;
            background: #f8fcfa;
            border-radius: 14px;
            padding: 22px;
            margin: 20px 0;
        }

        .paywall-features .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: #2d3436;
            font-size: 0.95em;
        }

        .check-icon {
            color: #00b894;
            font-weight: bold;
            font-size: 1.1em;
        }

        .pay-btn {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            width: 100%;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
            margin: 20px 0;
        }

        .pay-btn:hover { transform: translateY(-2px); }

        .countdown-bar {
            margin: 16px 0;
            padding: 12px 16px;
            background: #fff5e6;
            border-radius: 10px;
            color: #e67e22;
            font-size: 0.92em;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .countdown-num {
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
            min-width: 70px;
        }

        .buyer-info {
            color: #95a5a6;
            font-size: 0.85em;
            margin-bottom: 16px;
        }

        .paywall-guarantee {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .guarantee-item {
            color: #95a5a6;
            font-size: 0.82em;
        }

        .paywall-note {
            color: #b2bec3;
            font-size: 0.78em;
            margin-top: 18px;
            line-height: 1.6;
        }

        /* 弹窗 */
        .qrcode-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .qrcode-modal.show { display: flex; }

        .qrcode-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            max-width: 380px;
            width: 92%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .qrcode-content h3 {
            margin-bottom: 16px;
            color: #2d3436;
            font-size: 1.2em;
        }

        .qrcode-content p {
            color: #636e72;
            font-size: 0.9em;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .qrcode-placeholder {
            width: 220px; height: 220px;
            background: #f8fcfa;
            border: 2px solid #e8f5ee;
            border-radius: 12px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #b2bec3;
        }

        .modal-price {
            color: #e74c3c;
            font-size: 1.4em;
            font-weight: bold;
            margin: 4px 0;
        }

        .verify-steps {
            background: #f0faf6;
            border-radius: 10px;
            padding: 14px;
            margin: 14px 0;
            text-align: left;
        }

        .verify-steps .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 5px 0;
            font-size: 0.85em;
            color: #2d3436;
            line-height: 1.5;
        }

        .verify-steps .step-num {
            background: #00b894;
            color: white;
            min-width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 2px;
        }

        .verify-input-group { margin: 14px 0; }

        .verify-input-group label {
            display: block;
            color: #2d3436;
            font-size: 0.88em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .verify-input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e8f5ee;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .verify-input:focus { border-color: #00b894; }

        .verify-input-hint {
            color: #b2bec3;
            font-size: 0.75em;
            margin-top: 4px;
        }

        .confirm-paid-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .confirm-paid-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .confirm-paid-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .verify-error {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
        }

        .verify-waiting {
            color: #00b894;
            font-size: 0.95em;
            padding: 20px;
            text-align: center;
        }

        .verify-waiting .wait-spinner {
            width: 30px; height: 30px;
            border: 3px solid #e8f5ee;
            border-top: 3px solid #00b894;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        /* 结果页 */
        .result-page { display: none; }

        .result-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .result-city-emoji {
            font-size: 3.5em;
            margin-bottom: 12px;
        }

        .result-city {
            font-size: 2.2em;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 6px;
        }

        .result-slogan {
            color: #636e72;
            font-size: 1em;
            margin-bottom: 12px;
            font-style: italic;
        }

        .result-match {
            color: #00b894;
            font-size: 1.2em;
            font-weight: bold;
        }

        .result-card {
            background: #f8fcfa;
            border-radius: 16px;
            padding: 26px;
            margin-bottom: 20px;
            border: 1px solid #e8f5ee;
        }

        .result-card h3 {
            color: #2d3436;
            margin-bottom: 16px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .result-card p {
            color: #2d3436;
            line-height: 1.9;
            font-size: 0.95em;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .profile-item {
            background: white;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #e8f5ee;
        }

        .profile-item .p-label {
            font-size: 0.78em;
            color: #95a5a6;
            margin-bottom: 6px;
        }

        .profile-item .p-value {
            font-size: 1em;
            color: #00b894;
            font-weight: 600;
        }

        .dimension-analysis {
            margin-top: 16px;
        }

        .dim-detail {
            margin-bottom: 16px;
        }

        .dim-detail:last-child {
            margin-bottom: 0;
        }

        .dim-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .dim-detail-name {
            color: #2d3436;
            font-weight: 500;
            font-size: 0.92em;
        }

        .dim-detail-score {
            color: #00b894;
            font-weight: bold;
            font-size: 0.92em;
        }

        .dim-detail-bar {
            height: 8px;
            background: #e8f5ee;
            border-radius: 5px;
            overflow: hidden;
        }

        .dim-detail-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #00b894, #00cec9);
            transition: width 1.5s ease;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .tag {
            background: #e8f5ee;
            color: #00b894;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .other-city-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #e8f5ee;
        }

        .other-city-item:last-child {
            margin-bottom: 0;
        }

        .other-city-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2d3436;
            font-size: 0.95em;
        }

        .other-city-rank {
            color: #95a5a6;
            font-size: 0.85em;
        }

        .match-percent {
            color: #00b894;
            font-weight: bold;
            font-size: 0.95em;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
        }

        .home-btn {
            background: none;
            border: 2px solid #55efc4;
            color: #00b894;
            padding: 12px 32px;
            font-size: 0.95em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: #f0faf6;
        }

        .button-center {
            text-align: center;
            margin-top: 20px;
        }

        .fade-in { animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .start-page h1 { font-size: 1.6em; }
            .question-text { font-size: 1.05em; }
            .btn-group { flex-direction: column; }
            .dimension-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-grid { grid-template-columns: 1fr; }
            .result-city { font-size: 1.8em; }
            .paywall-guarantee { gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页 -->
        <div class="start-page" id="startPage">
            <div class="icon">🏙️</div>
            <h1>测测适合你的城市</h1>
            <p class="subtitle">如果城市是一个人<br>谁会是你的灵魂伴侣？</p>

            <div class="info-box">
                <h4>关于这个测试</h4>
                <p>本测试从六个维度评估你的生活偏好和性格特质，并从20座中国城市中为你匹配最适合的那一座。每座城市都有独特的气质和生活节奏，找到与你最契合的城市。</p>
            </div>

            <div class="dimension-grid">
                <div class="dim-item">
                    <div class="num">维度 1</div>
                    <div class="name">生活节奏</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 2</div>
                    <div class="name">审美取向</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 3</div>
                    <div class="name">环境偏好</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 4</div>
                    <div class="name">社交倾向</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 5</div>
                    <div class="name">事业追求</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 6</div>
                    <div class="name">口味偏好</div>
                </div>
            </div>

            <p style="color:#636e72;font-size:0.9em;margin-bottom:24px;line-height:1.6;">
                共 24 道题目，预计用时 3 分钟<br>
                请根据你的真实感受作答
            </p>

            <button class="start-btn" onclick="startQuiz()">开始测试</button>

            <p class="disclaimer">
                本测试仅供参考和娱乐<br>
                适合你的城市是你心之所向的地方
            </p>
        </div>

        <!-- 答题页 -->
        <div class="question-page" id="questionPage">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">第 1 / 24 题</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div id="questionArea" class="fade-in">

        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

            for (let i = 0; i < 4; i++) {
                for (let d of dimCodes) {
                    if (byDim[d][i]) {
                        const q = byDim[d][i];
                        questions.push({
                            dim: q.dim,
                            scenario: q.scenario,
                            q: q.q,
                            options: shuffleArray(q.options.map(o => ({...o})))
                        });
                    }
                }
            }
        }

            const area = document.getElementById('optionsArea');
            area.innerHTML = '';

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (answers[idx] === i ? ' selected' : '');
                div.innerHTML = `<div class="option-radio"></div><div class="option-text">${opt.text}</div>`;
                div.onclick = () => selectOption(idx, i);
                area.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? '查看结果' : '下一题';
            document.getElementById('nextBtn').disabled = answers[idx] === undefined;
            document.getElementById('autoNextHint').classList.remove('show');

            const qa = document.getElementById('questionArea');
            qa.classList.remove('fade-in');
            void qa.offsetWidth;
            qa.classList.add('fade-in');
        }

        function selectOption(qIdx, optIdx) {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            const isFirst = answers[qIdx] === undefined;
            answers[qIdx] = optIdx;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.className = 'option' + (i === optIdx ? ' selected' : '');
            });
            document.getElementById('nextBtn').disabled = false;
            if (isFirst && qIdx < questions.length - 1) {
                document.getElementById('autoNextHint').classList.add('show');
                autoNextTimer = setTimeout(() => {
                    document.getElementById('autoNextHint').classList.remove('show');
                    nextQuestion();
                }, 600);
            }
        }

        function nextQuestion() {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            if (currentQuestion < questions.length - 1) { currentQuestion++; showQuestion(currentQuestion); }
            else showLoading();
        }

        function prevQuestion() {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            if (currentQuestion > 0) { currentQuestion--; showQuestion(currentQuestion); }

        function calculateResult() {
            const userScores = {};
            dimCodes.forEach(d => userScores[d] = 0);

            answers.forEach((ans, i) => {
                if (ans === undefined) return;
                const opt = questions[i].options[ans];
                if (opt.scores) {
                    for (const [k, v] of Object.entries(opt.scores)) {
                        userScores[k] = (userScores[k] || 0) + v;
                    }
                }
            });

            const userProfile = {};
            dimCodes.forEach(d => {
                userProfile[d] = Math.min(10, Math.max(0, Math.round(userScores[d] / 3)));
            });

            let cityMatches = [];
            for (const [key, city] of Object.entries(cities)) {
                let diff = 0;
                let total = 0;
                dimCodes.forEach(d => {
                    const d1 = userProfile[d] || 5;
                    const d2 = city.profile[d] || 5;
                    diff += Math.abs(d1 - d2);
                    total += 10;
                });
                const matchScore = Math.round((1 - diff / total) * 100);
                cityMatches.push({ key, city, matchScore });
            }

            cityMatches.sort((a, b) => b.matchScore - a.matchScore);
            return { userProfile, cityMatches, topCity: cityMatches[0] };
        }

                userProfile.tempo > 5 ? "快节奏" : "慢生活",
                userProfile.soul > 5 ? "文艺浪漫" : "务实接地气",
                userProfile.nature > 5 ? "亲近自然" : "都市生活",
                userProfile.social > 5 ? "社交达人" : "独处爱好者",
                userProfile.ambition > 5 ? "拼搏进取" : "安稳幸福",
                userProfile.taste > 5 ? "重口味" : "清淡系"
            ];

            let profileHTML = '';
            profileLabels.forEach((l, i) => {
                profileHTML += `<div class="profile-item"><div class="p-label">${l}</div><div class="p-value">${profileValues[i]}</div></div>`;
            });

            let tagsHTML = tc.tags.map(t => `<span class="tag">${t}</span>`).join('');

            let otherHTML = '';
            for (let i = 1; i <= Math.min(4, cityMatches.length - 1); i++) {
                const c = cityMatches[i];
                const p = Math.min(95, Math.max(50, c.matchScore + Math.floor(Math.random()*5)));
                otherHTML += `<div class="other-city-item"><div class="other-city-info"><span class="other-city-rank">#${i+1}</span><span>${c.city.emoji} ${c.city.name}</span></div><span class="match-percent">${p}%</span></div>`;
            }

            rp.innerHTML = `
                <div class="result-header">
                    <div class="result-city-emoji">${tc.emoji}</div>
                    <div class="result-city">${tc.name}</div>
                    <div class="result-slogan">${tc.slogan}</div>
                    <div class="result-match">匹配度 ${matchPct}%</div>
                </div>

                <div class="result-card">
                    <h3>你的生活画像</h3>
                    <div class="profile-grid">${profileHTML}</div>
                </div>

                <div class="result-card">
                    <h3>为什么是${tc.name}</h3>
                    <p>${tc.analysis}</p>
                </div>

                <div class="result-card">
                    <h3>六维度详细分析</h3>
                    <div class="dimension-analysis">${dimHTML}</div>
                </div>

                <div class="result-card">
                    <h3>城市标签</h3>
                    <div class="tags">${tagsHTML}</div>
                </div>

                <div class="result-card">
                    <h3>其他适合你的城市</h3>
                    ${otherHTML}
                </div>

                <div class="result-card" style="background:#f0faf6;border-color:#d0ede0;">
                    <h3>温馨寄语</h3>
                    <p>每座城市都有它独特的魅力与温度。测试结果是一种有趣的参考，而真正适合你的地方，是那个让你心生欢喜、愿意为之努力的地方。无论你在哪座城市，都请相信：你值得拥有美好的生活，而美好的生活也正在向你走来。</p>
                </div>

                <div class="button-center">
                    <button class="restart-btn" onclick="restart()">重新测试</button>
                    <br>
                    <button class="home-btn" onclick="location.href='/'">返回首页</button>
                </div>
            `;

            setTimeout(() => {
                document.querySelectorAll('.dim-detail-fill').forEach(el => { el.style.width = el.dataset.width; });
            }, 300);
        }

        function restart() {
            currentQuestion = 0; answers = []; calculatedResult = null;
            if (countdownInterval) clearInterval(countdownInterval);
            if (autoNextTimer) clearTimeout(autoNextTimer);
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('paywallPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('questionPage').style.display === 'block') {
                if (e.key >= '1' && e.key <= '4') { const i = parseInt(e.key)-1; const o = document.querySelectorAll('.option'); if(o[i]) o[i].click(); }
                if (e.key === 'ArrowRight' || e.key === 'Enter') { if (!document.getElementById('nextBtn').disabled) nextQuestion(); }
                if (e.key === 'ArrowLeft') { if (!document.getElementById('prevBtn').disabled) prevQuestion(); }
            }
            if (e.key === 'Escape') closeQRCode();
        });
    </script>
</body>
</html>

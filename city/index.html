<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测适合你的城市 - JoyCece</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.96);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #43e97b, #38f9d7, #00b894, #55efc4, #00cec9, #81ecec);
        }

        .start-page { text-align: center; padding: 40px 0; }

        .start-page h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #00b894, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .start-page .subtitle { color: #666; font-size: 1.05em; margin-bottom: 10px; line-height: 1.8; }
        .start-page .desc { color: #999; font-size: 0.88em; margin-bottom: 32px; line-height: 1.6; }
        .start-page .emoji-row { font-size: 2.5em; margin-bottom: 28px; letter-spacing: 6px; }

        .dimension-intro {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 32px;
            text-align: left;
        }

        .dim-card { background: #f0faf6; border-radius: 12px; padding: 12px; }
        .dim-card-title { font-size: 0.82em; font-weight: bold; color: #00b894; margin-bottom: 3px; }
        .dim-card-desc { font-size: 0.72em; color: #999; line-height: 1.4; }

        .start-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white; border: none;
            padding: 16px 48px; font-size: 1.2em;
            border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,184,148,0.4);
        }

        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,184,148,0.5); }

        .progress-container { margin-bottom: 28px; }

        .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.88em; color: #888; }

        .progress-bar { height: 8px; background: #e0f5ee; border-radius: 10px; overflow: hidden; }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .dim-indicator { display: flex; justify-content: center; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }

        .dim-dot {
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.7em; font-weight: 500;
            background: #e0f5ee; color: #00b894;
            transition: all 0.3s;
        }

        .dim-dot.active { background: #00b894; color: white; }
        .dim-dot.done { background: #55efc4; color: white; }

        .question-page { display: none; }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white; width: 36px; height: 36px;
            line-height: 36px; text-align: center;
            border-radius: 50%; font-size: 0.85em;
            font-weight: bold; margin-bottom: 14px;
        }

        .question-scenario {
            text-align: center;
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 8px;
            font-style: italic;
        }

        .question-text {
            font-size: 1.2em; color: #333;
            margin-bottom: 24px; line-height: 1.7;
            font-weight: 500; text-align: center;
        }

        .options { display: flex; flex-direction: column; gap: 11px; margin-bottom: 28px; }

        .option {
            padding: 16px 18px;
            border: 2px solid #e0f5ee;
            border-radius: 14px; cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em; color: #555;
            line-height: 1.5; position: relative;
            display: flex; align-items: center; gap: 12px;
        }

        .option:hover { border-color: #00b894; background: rgba(0,184,148,0.04); transform: translateX(4px); }

        .option.selected {
            border-color: #00b894;
            background: linear-gradient(135deg, rgba(0,184,148,0.08), rgba(0,206,201,0.08));
            color: #333; font-weight: 500;
        }

        .option.selected::after {
            content: '✓'; position: absolute;
            right: 14px; top: 50%; transform: translateY(-50%);
            color: #00b894; font-weight: bold; font-size: 1.1em;
        }

        .option-emoji { font-size: 1.4em; min-width: 28px; text-align: center; }

        .option-label {
            display: inline-flex; align-items: center; justify-content: center;
            background: #00b894; color: white;
            width: 22px; height: 22px; border-radius: 50%;
            font-size: 0.7em; font-weight: bold;
        }

        .option.selected .option-label { background: #00cec9; }

        .auto-next-hint {
            text-align: center; color: #00b894;
            font-size: 0.82em; margin-top: -18px;
            margin-bottom: 18px; opacity: 0;
            transition: opacity 0.3s ease;
        }

        .auto-next-hint.show { opacity: 1; }

        .btn-group { display: flex; justify-content: space-between; gap: 12px; }

        .btn {
            padding: 12px 32px; border: none; border-radius: 50px;
            font-size: 1em; cursor: pointer;
            transition: all 0.3s ease; font-weight: 500;
        }

        .btn-prev { background: #e0f5ee; color: #00b894; }
        .btn-prev:hover { background: #c6ede0; }

        .btn-next {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white; box-shadow: 0 4px 15px rgba(0,184,148,0.3);
        }

        .btn-next:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* 加载 */
        .loading-page { display: none; text-align: center; padding: 60px 0; }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid #e0f5ee;
            border-top: 4px solid #00b894;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: #888; font-size: 1.1em; }

        /* 付费墙 */
        .paywall-page { display: none; text-align: center; padding: 20px 0; }

        .paywall-page h2 {
            font-size: 1.6em;
            background: linear-gradient(135deg, #00b894, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .paywall-preview {
            background: linear-gradient(135deg, #f0faf6, #dff5ec);
            border-radius: 18px; padding: 24px;
            margin: 20px 0; position: relative; overflow: hidden;
        }

        .paywall-preview::after {
            content: ''; position: absolute;
            bottom: 0; left: 0; right: 0; height: 80px;
            background: linear-gradient(transparent, rgba(255,255,255,0.95));
        }

        .paywall-lock { font-size: 3em; margin: 20px 0 10px; }

        .paywall-price {
            display: flex; align-items: center;
            justify-content: center; gap: 12px; margin: 16px 0;
        }

        .price-original { color: #ccc; text-decoration: line-through; font-size: 1.1em; }
        .price-current { color: #e17055; font-size: 2em; font-weight: bold; }
        .price-tag { background: #e17055; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.75em; }

        .paywall-features {
            text-align: left; background: #f0faf6;
            border-radius: 14px; padding: 20px; margin: 20px 0;
        }

        .paywall-features .feature-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0; color: #555; font-size: 0.95em;
        }

        .paywall-features .feature-item::before { content: '✅'; }

        .pay-btn {
            padding: 16px; border: none; border-radius: 14px;
            font-size: 1.1em; cursor: pointer;
            transition: all 0.3s ease; font-weight: 500;
            display: flex; align-items: center;
            justify-content: center; gap: 8px; width: 100%;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white; box-shadow: 0 4px 15px rgba(0,184,148,0.3);
            margin: 20px 0;
        }

        .pay-btn:hover { transform: translateY(-2px); }

        .countdown-bar {
            margin: 16px 0; padding: 12px 16px;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 12px; color: #e17055;
            font-size: 0.95em; font-weight: 500;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }

        .countdown-num { font-size: 1.3em; font-weight: bold; color: #d63031; min-width: 80px; }

        .paywall-guarantee {
            display: flex; justify-content: center;
            gap: 20px; margin-top: 16px; flex-wrap: wrap;
        }

        .guarantee-item { color: #999; font-size: 0.8em; display: flex; align-items: center; gap: 4px; }

        .paywall-note { color: #bbb; font-size: 0.8em; margin-top: 16px; line-height: 1.6; }

        /* 弹窗 */
        .qrcode-modal {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 1000;
            justify-content: center; align-items: center;
        }

        .qrcode-modal.show { display: flex; }

        .qrcode-content {
            background: white; border-radius: 20px;
            padding: 32px; text-align: center;
            max-width: 380px; width: 92%;
            position: relative; max-height: 90vh; overflow-y: auto;
        }

        .qrcode-content h3 { margin-bottom: 16px; color: #333; }
        .qrcode-content p { color: #888; font-size: 0.9em; margin-bottom: 12px; line-height: 1.6; }

        .qrcode-placeholder {
            width: 220px; height: 220px;
            background: #f0faf6; border: 3px dashed #00b894;
            border-radius: 12px; margin: 0 auto 12px;
            display: flex; align-items: center;
            justify-content: center; overflow: hidden;
        }

        .close-modal {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none;
            font-size: 1.5em; cursor: pointer; color: #999;
        }

        .modal-price { color: #e17055; font-size: 1.4em; font-weight: bold; margin: 4px 0; }

        .verify-steps {
            background: #f0faf6; border: 1px solid #e0f5ee;
            border-radius: 12px; padding: 16px;
            margin: 16px 0; text-align: left;
        }

        .verify-steps .step {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 6px 0; font-size: 0.85em; color: #555; line-height: 1.5;
        }

        .verify-steps .step-num {
            background: #00b894; color: white;
            min-width: 20px; height: 20px; line-height: 20px;
            text-align: center; border-radius: 50%;
            font-size: 0.75em; font-weight: bold; margin-top: 2px;
        }

        .verify-input-group { margin: 16px 0; }

        .verify-input-group label {
            display: block; color: #555;
            font-size: 0.85em; margin-bottom: 8px; font-weight: 500;
        }

        .verify-input {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e0f5ee; border-radius: 12px;
            font-size: 1em; outline: none;
            transition: border-color 0.3s; text-align: center;
        }

        .verify-input:focus { border-color: #00b894; }
        .verify-input-hint { color: #bbb; font-size: 0.75em; margin-top: 4px; }

        .confirm-paid-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white; border: none;
            padding: 14px 36px; border-radius: 50px;
            font-size: 1.05em; cursor: pointer;
            margin-top: 12px; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
            width: 100%;
        }

        .confirm-paid-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .confirm-paid-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .verify-error { color: #e17055; font-size: 0.85em; margin-top: 8px; display: none; }

        .verify-waiting { color: #00b894; font-size: 0.95em; padding: 20px; text-align: center; }

        .verify-waiting .wait-spinner {
            width: 30px; height: 30px;
            border: 3px solid #e0f5ee;
            border-top: 3px solid #00b894;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        /* 结果页 */
        .result-page { display: none; text-align: center; }

        .result-city-emoji { font-size: 4em; margin-bottom: 10px; }

        .result-city {
            font-size: 2.4em; font-weight: bold;
            background: linear-gradient(135deg, #00b894, #e17055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }

        .result-slogan { color: #888; font-size: 1.05em; margin-bottom: 8px; font-style: italic; }

        .result-match { color: #00b894; font-size: 1.3em; font-weight: bold; margin-bottom: 24px; }

        .result-card {
            background: linear-gradient(135deg, #f0faf6, #dff5ec);
            border-radius: 18px; padding: 28px;
            margin-bottom: 24px; text-align: left;
        }

        .result-card h3 {
            color: #2d3436; margin-bottom: 14px;
            font-size: 1.15em; display: flex;
            align-items: center; gap: 8px;
        }

        .result-card p { color: #444; line-height: 2; font-size: 1em; letter-spacing: 0.3px; }

        .dimension-bars { margin-top: 20px; }
        .dimension-item { margin-bottom: 16px; }

        .dimension-label {
            display: flex; justify-content: space-between;
            margin-bottom: 6px; font-size: 0.88em; color: #555; font-weight: 500;
        }

        .dimension-bar {
            height: 12px; background: rgba(255,255,255,0.7);
            border-radius: 10px; overflow: hidden;
        }

        .dimension-fill {
            height: 100%; border-radius: 10px;
            transition: width 1.5s ease;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }

        .tag {
            background: rgba(0,184,148,0.15); color: #00b894;
            padding: 8px 16px; border-radius: 20px;
            font-size: 0.9em; font-weight: 500;
        }

        .other-city-item {
            display: flex; align-items: center;
            justify-content: space-between; padding: 14px 18px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px; margin-bottom: 10px; font-size: 1em;
        }

        .other-city-info { display: flex; align-items: center; gap: 10px; }
        .other-city-rank { color: #999; font-size: 0.9em; }
        .match-percent { color: #00b894; font-weight: bold; font-size: 1em; }

        .profile-grid {
            display: grid; grid-template-columns: repeat(2,1fr);
            gap: 10px; margin-top: 14px;
        }

        .profile-item {
            background: rgba(0,184,148,0.08);
            padding: 12px; border-radius: 12px;
            text-align: center;
        }

        .profile-item .p-label { font-size: 0.75em; color: #999; margin-bottom: 4px; }
        .profile-item .p-value { font-size: 1em; color: #00b894; font-weight: bold; }

        .result-warm {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 18px; padding: 28px;
            margin-bottom: 24px; text-align: left;
        }

        .result-warm h3 {
            color: #2d3436; margin-bottom: 14px;
            font-size: 1.15em; display: flex;
            align-items: center; gap: 8px;
        }

        .result-warm p { color: #555; line-height: 2; font-size: 1em; }

        .restart-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white; border: none;
            padding: 14px 40px; font-size: 1.05em;
            border-radius: 50px; cursor: pointer;
            margin-top: 28px; transition: all 0.3s ease;
        }

        .restart-btn:hover { transform: translateY(-2px); }

        .home-btn {
            background: none; border: 2px solid #00b894;
            color: #00b894; padding: 12px 32px;
            font-size: 0.95em; border-radius: 50px;
            cursor: pointer; margin-top: 12px;
            transition: all 0.3s ease;
        }

        .home-btn:hover { background: #f0faf6; }

        .share-hint { margin-top: 16px; color: #aaa; font-size: 0.9em; }

        .fade-in { animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .start-page h1 { font-size: 1.7em; }
            .question-text { font-size: 1.05em; }
            .btn-group { flex-direction: column; }
            .dimension-intro { grid-template-columns: repeat(2,1fr); }
            .result-city { font-size: 1.9em; }
            .profile-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="start-page" id="startPage">
            <div class="emoji-row">🏙️🌿🌊🏔️</div>
            <h1>测测适合你的城市</h1>
            <p class="subtitle">如果城市是一个人<br>谁会是你的灵魂伴侣？</p>
            <div class="dimension-intro">
                <div class="dim-card"><div class="dim-card-title">🌡️ 生活温度</div><div class="dim-card-desc">快节奏 or 慢生活</div></div>
                <div class="dim-card"><div class="dim-card-title">🎨 灵魂色彩</div><div class="dim-card-desc">文艺 or 务实</div></div>
                <div class="dim-card"><div class="dim-card-title">🌊 自然磁场</div><div class="dim-card-desc">山海 or 都市</div></div>
                <div class="dim-card"><div class="dim-card-title">🔥 社交能量</div><div class="dim-card-desc">热闹 or 安静</div></div>
                <div class="dim-card"><div class="dim-card-title">🚀 野心指数</div><div class="dim-card-desc">拼搏 or 安稳</div></div>
                <div class="dim-card"><div class="dim-card-title">👅 味蕾基因</div><div class="dim-card-desc">重口 or 清淡</div></div>
            </div>
            <p class="desc">24 道趣味情景题 · 约 3 分钟<br>选择最真实的你，没有对错 💫</p>
            <button class="start-btn" onclick="startQuiz()">开始探索 →</button>
        </div>

        <div class="question-page" id="questionPage">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">第 1 / 24 题</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>
            <div class="dim-indicator" id="dimIndicator"></div>
            <div id="questionArea" class="fade-in">
                <div class="question-number" id="questionNum">1</div>
                <div class="question-scenario" id="questionScenario"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsArea"></div>
                <div class="auto-next-hint" id="autoNextHint">✨ 已选择，跳转下一题...</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()" disabled>← 上一题</button>
                <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
            </div>
        </div>

        <div class="loading-page" id="loadingPage">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在匹配你的灵魂城市...</div>
        </div>

        <div class="paywall-page" id="paywallPage"></div>
        <div class="result-page" id="resultPage"></div>
    </div>

    <script>
    // ==================== 六维度24题 ====================
    const dimNames = ["🌡️生活温度", "🎨灵魂色彩", "🌊自然磁场", "🔥社交能量", "🚀野心指数", "👅味蕾基因"];
    const dimCodes = ["tempo", "soul", "nature", "social", "ambition", "taste"];

    const questionsRaw = [
        // === 🌡️ 生活温度（4题）===
        { dim: "tempo", scenario: "想象一下你的理想早晨 ☀️", q: "闹钟响了，你的第一反应是？", options: [
            { emoji: "⚡", text: "立刻起床，今天有一堆事要做", scores: { tempo: 9, ambition: 3 } },
            { emoji: "☕", text: "不急，先赖一会儿再慢慢喝杯咖啡", scores: { tempo: 3, soul: 2 } },
            { emoji: "📱", text: "边看手机边起床，快速进入状态", scores: { tempo: 7, social: 2 } },
            { emoji: "🌅", text: "自然醒最好，按自己的节奏来", scores: { tempo: 1, nature: 2 } }
        ]},
        { dim: "tempo", scenario: "你拿到了一周假期 🎉", q: "你会怎么安排？", options: [
            { emoji: "✈️", text: "制定详细攻略，把每天都安排得满满当当", scores: { tempo: 9, ambition: 2 } },
            { emoji: "🏠", text: "没有计划就是最好的计划，想干嘛干嘛", scores: { tempo: 2, soul: 3 } },
            { emoji: "🗺️", text: "定个大方向，其他随缘走到哪算哪", scores: { tempo: 5, nature: 2 } },
            { emoji: "📚", text: "终于可以做一直想做但没时间做的事了", scores: { tempo: 4, soul: 2 } }
        ]},

    function shuffleArray(arr) {
        const s = [...arr];
        for (let i = s.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [s[i], s[j]] = [s[j], s[i]];
        }
        return s;
    }

    function initQuestions() {
        const byDim = {};
        dimCodes.forEach(d => byDim[d] = []);
        questionsRaw.forEach(q => byDim[q.dim].push(q));

        questions = [];
        // 按维度分组打乱，然后交替排列
        for (let d of dimCodes) byDim[d] = shuffleArray(byDim[d]);

        for (let i = 0; i < 4; i++) {
            for (let d of dimCodes) {
                if (byDim[d][i]) {
                    const q = byDim[d][i];
                    questions.push({
                        dim: q.dim,
                        scenario: q.scenario,
                        q: q.q,
                        options: shuffleArray(q.options.map(o => ({...o})))
                    });
                }
            }
        }
    }

    function updateDimIndicator(qIdx) {
        const done = {};

    function showQuestion(idx) {
        const q = questions[idx];

        document.getElementById('questionText').textContent = q.q;
        document.getElementById('progressText').textContent = `第 ${idx+1} / ${questions.length} 题`;
        const pct = Math.round(idx / questions.length * 100);
        document.getElementById('progressPercent').textContent = pct + '%';
        document.getElementById('progressFill').style.width = pct + '%';

        updateDimIndicator(idx);

        const area = document.getElementById('optionsArea');
        area.innerHTML = '';
        const labels = ['A','B','C','D'];

        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option' + (answers[idx] === i ? ' selected' : '');
            div.innerHTML = `<span class="option-emoji">${opt.emoji}</span><span class="option-label">${labels[i]}</span><span>${opt.text}</span>`;
            div.onclick = () => selectOption(idx, i);
            area.appendChild(div);
        });

        document.getElementById('prevBtn').disabled = idx === 0;
        document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? '查看结果 🎉' : '下一题 →';
        document.getElementById('nextBtn').disabled = answers[idx] === undefined;
        document.getElementById('autoNextHint').classList.remove('show');

        const qa = document.getElementById('questionArea');
        qa.classList.remove('fade-in');
        void qa.offsetWidth;
        qa.classList.add('fade-in');
    }

    function selectOption(qIdx, optIdx) {
        if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
        const isFirst = answers[qIdx] === undefined;
        answers[qIdx] = optIdx;
        document.querySelectorAll('.option').forEach((el, i) => {
            el.className = 'option' + (i === optIdx ? ' selected' : '');
        });
        document.getElementById('nextBtn').disabled = false;
        if (isFirst && qIdx < questions.length - 1) {
            document.getElementById('autoNextHint').classList.add('show');
            autoNextTimer = setTimeout(() => {
                document.getElementById('autoNextHint').classList.remove('show');
                nextQuestion();
            }, 600);
        }
    }

    function nextQuestion() {
        if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
        if (currentQuestion < questions.length - 1) { currentQuestion++; showQuestion(currentQuestion); }
        else showLoading();
    }

    function prevQuestion() {
        if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
        if (currentQuestion > 0) { currentQuestion--; showQuestion(currentQuestion); }
    }

    function calculateResult() {
        const userScores = {};
        dimCodes.forEach(d => userScores[d] = 0);

        answers.forEach((ans, i) => {
            if (ans === undefined) return;
            const opt = questions[i].options[ans];
            if (opt.scores) {
                for (const [k, v] of Object.entries(opt.scores)) {
                    userScores[k] = (userScores[k] || 0) + v;
                }
            }
        });

        // 归一化到 0-10
        const maxPossible = {};
        dimCodes.forEach(d => maxPossible[d] = 0);
        questionsRaw.forEach(q => {
            q.options.forEach(opt => {
                if (opt.scores) {
                    for (const [k, v] of Object.entries(opt.scores)) {
                        // 粗略估计
                    }
                }
            });
        });

        const userProfile = {};
        dimCodes.forEach(d => {
            userProfile[d] = Math.min(10, Math.max(0, Math.round(userScores[d] / 3)));
        });

        // 计算与每座城市的匹配度
        let cityMatches = [];
        for (const [key, city] of Object.entries(cities)) {
            let diff = 0;
            let total = 0;
            dimCodes.forEach(d => {
                const d1 = userProfile[d] || 5;
                const d2 = city.profile[d] || 5;
                diff += Math.abs(d1 - d2);
                total += 10;
            });
            const matchScore = Math.round((1 - diff / total) * 100);
            cityMatches.push({ key, city, matchScore });
        }

        cityMatches.sort((a, b) => b.matchScore - a.matchScore);

        return { userProfile, cityMatches, topCity: cityMatches[0] };
    }

        const matchPct = Math.min(98, Math.max(72, topCity.matchScore + Math.floor(Math.random()*5)));

        const dimLabels = ["生活温度", "灵魂色彩", "自然磁场", "社交能量", "野心指数", "味蕾基因"];
        const dimColors = ['#00b894', '#6c5ce7', '#0984e3', '#e17055', '#fdcb6e', '#fd79a8'];

        let dimHTML = '';
        dimCodes.forEach((d, i) => {
            const val = Math.min(100, Math.max(10, (userProfile[d] || 5) * 10));
            dimHTML += `<div class="dimension-item"><div class="dimension-label"><span>${dimLabels[i]}</span><span>${val}%</span></div><div class="dimension-bar"><div class="dimension-fill" style="width:0%;background:${dimColors[i]};" data-width="${val}%"></div></div></div>`;
        });

        const profileLabels = ["生活节奏", "审美取向", "环境偏好", "社交倾向", "事业追求", "口味偏好"];
        const profileValues = [
            userProfile.tempo > 5 ? "快节奏" : "慢生活",
            userProfile.soul > 5 ? "文艺浪漫" : "务实接地气",
            userProfile.nature > 5 ? "亲近自然" : "都市生活",
            userProfile.social > 5 ? "社交达人" : "独处爱好者",
            userProfile.ambition > 5 ? "拼搏进取" : "安稳幸福",
            userProfile.taste > 5 ? "重口味" : "清淡系"
        ];

        let profileHTML = '';
        profileLabels.forEach((l, i) => {
            profileHTML += `<div class="profile-item"><div class="p-label">${l}</div><div class="p-value">${profileValues[i]}</div></div>`;
        });

        let tagsHTML = tc.tags.map(t => `<span class="tag">${t}</span>`).join('');

        let otherHTML = '';
        for (let i = 1; i <= Math.min(4, cityMatches.length - 1); i++) {
            const c = cityMatches[i];
            const p = Math.min(95, Math.max(50, c.matchScore + Math.floor(Math.random()*5)));
            otherHTML += `<div class="other-city-item"><div class="other-city-info"><span class="other-city-rank">#${i+1}</span><span>${c.city.emoji} ${c.city.name}</span></div><span class="match-percent">${p}%</span></div>`;
        }

        rp.innerHTML = `
            <div class="result-city-emoji">${tc.emoji}</div>
            <div class="result-city">${tc.name}</div>
            <div class="result-slogan">"${tc.slogan}"</div>
            <div class="result-match">匹配度：${matchPct}% ✨</div>

            <div class="result-card">
                <h3>🎯 你的生活画像</h3>
                <div class="profile-grid">${profileHTML}</div>
            </div>

            <div class="result-card">
                <h3>📝 为什么是${tc.name}？</h3>
                <p>${tc.analysis}</p>
            </div>

            <div class="result-card">
                <h3>📊 六维匹配分析</h3>
                <div class="dimension-bars">${dimHTML}</div>
            </div>

            <div class="result-card">
                <h3>🏷️ 城市标签</h3>
                <div class="tags">${tagsHTML}</div>
            </div>

            <div class="result-card">
                <h3>🌟 其他适合你的城市</h3>
                ${otherHTML}
            </div>

            <div class="result-warm">
                <h3>💝 温馨寄语</h3>
                <p>每座城市都有它独特的魅力与温度。测试结果是一种有趣的参考，而真正适合你的地方，是那个让你心生欢喜、愿意为之努力的地方。无论你在哪座城市，都请相信：你值得拥有美好的生活，而美好的生活也正在向你走来。愿你在自己热爱的城市里，活出最精彩的人生！🌟</p>
            </div>

            <button class="restart-btn" onclick="restart()">🔄 重新测试</button>
            <br>
            <button class="home-btn" onclick="location.href='/'">🏠 返回首页</button>
            <p class="share-hint">把结果分享给朋友，看看你们是不是同一座城市的有缘人 😄</p>
        `;

        setTimeout(() => {
            document.querySelectorAll('.dimension-fill').forEach(el => { el.style.width = el.dataset.width; });
        }, 300);
    }

    function restart() {
        currentQuestion = 0; answers = []; calculatedResult = null;
        if (countdownInterval) clearInterval(countdownInterval);
        if (autoNextTimer) clearTimeout(autoNextTimer);
        document.getElementById('resultPage').style.display = 'none';
        document.getElementById('paywallPage').style.display = 'none';
        document.getElementById('startPage').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('keydown', (e) => {
        if (document.getElementById('questionPage').style.display === 'block') {
            if (e.key >= '1' && e.key <= '4') { const i = parseInt(e.key)-1; const o = document.querySelectorAll('.option'); if(o[i]) o[i].click(); }
            if (e.key === 'ArrowRight' || e.key === 'Enter') { if (!document.getElementById('nextBtn').disabled) nextQuestion(); }
            if (e.key === 'ArrowLeft') { if (!document.getElementById('prevBtn').disabled) prevQuestion(); }
        }
        if (e.key === 'Escape') closeQRCode();
    });
    </script>
</body>
</html>

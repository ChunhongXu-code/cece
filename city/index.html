<!DOCTYPE html>
<html lang='zh-CN'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>测测适合你的城市 - JoyCece</title>
    <style>
        /* CSS样式保持不变，直接复用你原来的设计 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #43e97b, #38f9d7, #00b894, #00cec9);
        }

        /* 开始页 */
        .start-page { text-align: center; padding: 30px 0; }
        .start-page .icon { font-size: 3em; margin-bottom: 20px; }
        .start-page h1 { font-size: 2em; color: #2d3436; margin-bottom: 12px; font-weight: 600; }
        .start-page .subtitle { color: #636e72; font-size: 1.05em; margin-bottom: 28px; line-height: 1.8; }

        .info-box {
            background: #f0faf6;
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 28px;
            border-left: 4px solid #00b894;
        }
        .info-box h4 { color: #00b894; font-size: 0.95em; margin-bottom: 10px; font-weight: 600; }
        .info-box p { color: #636e72; font-size: 0.88em; line-height: 1.8; }

        .dimension-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }
        .dim-item {
            background: #f8fcfa;
            border-radius: 10px;
            padding: 14px;
            text-align: left;
            border: 1px solid #e8f5ee;
        }
        .dim-item .num { color: #00b894; font-size: 0.72em; font-weight: bold; margin-bottom: 4px; }
        .dim-item .name { color: #2d3436; font-size: 0.9em; font-weight: 500; }

        .start-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,184,148,0.35);
            font-weight: 500;
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,184,148,0.45); }
        .disclaimer { margin-top: 20px; color: #b2bec3; font-size: 0.78em; line-height: 1.6; }

        /* 进度条 */
        .progress-container { margin-bottom: 28px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.88em; color: #636e72; }
        .progress-bar { height: 6px; background: #e8f5ee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00b894, #00cec9); border-radius: 10px; transition: width 0.5s ease; }
        .dim-tag { display: inline-block; background: #e8f5ee; color: #00b894; padding: 4px 14px; border-radius: 20px; font-size: 0.78em; margin-bottom: 18px; font-weight: 500; }

        /* 答题页 */
        .question-page { display: none; }
        .question-scenario { color: #636e72; font-size: 0.9em; margin-bottom: 8px; line-height: 1.6; }
        .question-text { font-size: 1.15em; color: #2d3436; margin-bottom: 26px; line-height: 1.7; font-weight: 500; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #e8f5ee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.98em;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
        }
        .option:hover { border-color: #55efc4; background: #f8fcfa; }
        .option.selected { border-color: #00b894; background: #f0faf6; font-weight: 500; }
        .option-radio { width: 22px; height: 22px; border: 2px solid #b2bec3; border-radius: 50%; flex-shrink: 0; position: relative; transition: all 0.25s; }
        .option.selected .option-radio { border-color: #00b894; }
        .option.selected .option-radio::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: #00b894; border-radius: 50%; }
        .option-text { flex: 1; }
        .auto-next-hint { text-align: center; color: #00b894; font-size: 0.85em; margin-top: -16px; margin-bottom: 18px; opacity: 0; transition: opacity 0.3s; }
        .auto-next-hint.show { opacity: 1; }

        .btn-group { display: flex; justify-content: space-between; gap: 12px; }
        .btn { padding: 12px 32px; border: none; border-radius: 50px; font-size: 0.98em; cursor: pointer; transition: all 0.3s ease; font-weight: 500; }
        .btn-prev { background: #f1f5f9; color: #636e72; }
        .btn-prev:hover { background: #e2e8f0; }
        .btn-next { background: linear-gradient(135deg, #00b894, #00cec9); color: white; box-shadow: 0 4px 15px rgba(0,184,148,0.3); }
        .btn-next:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* 加载 */
        .loading-page { display: none; text-align: center; padding: 60px 0; }
        .loading-spinner { width: 56px; height: 56px; border: 4px solid #e8f5ee; border-top: 4px solid #00b894; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #636e72; font-size: 1.05em; }

        /* ========== 公众号验证墙 (原付费墙) ========== */
        .paywall-page { display: none; text-align: center; padding: 20px 0; }
        .paywall-page h2 { font-size: 1.6em; color: #2d3436; margin-bottom: 12px; }
        .paywall-page .subtitle { color: #636e72; margin-bottom: 24px; font-size: 1em; }
        .paywall-preview { background: #f0faf6; border-radius: 16px; padding: 28px 24px; margin: 20px 0; border: 1px solid #e8f5ee; }
        .preview-city-name { font-size: 1.6em; font-weight: bold; color: #00b894; margin-bottom: 8px; }
        .preview-desc { color: #636e72; font-size: 0.92em; line-height: 1.7; }
        .paywall-lock { font-size: 2.5em; margin: 20px 0 10px; color: #55efc4; }
        
        .paywall-features { text-align: left; background: #f8fcfa; border-radius: 14px; padding: 22px; margin: 20px 0; }
        .paywall-features .feature-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; color: #2d3436; font-size: 0.95em; }
        .check-icon { color: #00b894; font-weight: bold; font-size: 1.1em; }

        .pay-btn-dark { padding: 16px; border: none; border-radius: 14px; font-size: 1.1em; cursor: pointer; transition: all 0.3s ease; font-weight: 500; width: 100%; color: white; margin: 10px 0; background: linear-gradient(135deg, #00b894, #00cec9); box-shadow: 0 4px 15px rgba(0,184,148,0.3); }
        .pay-btn-dark:hover { transform: translateY(-2px); }

        .pay-env-tip { background: #f0faf6; border-radius: 14px; padding: 24px; margin: 16px 0; text-align: left; border: 1px dashed #00b894; }
        .pay-env-tip .tip-title { font-weight: 600; color: #00b894; margin-bottom: 8px; display: block; font-size: 1.05em; }
        .qr-container { text-align: center; margin: 20px 0; }
        .qr-code { width: 160px; height: 160px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; padding: 8px; }

        .verify-section { margin-top: 20px; background: #f8fcfa; padding: 24px; border-radius: 14px; border: 1px solid #e8f5ee; text-align: left; }
        .verify-section label { display: block; color: #2d3436; font-size: 0.95em; margin-bottom: 10px; font-weight: bold; }
        .verify-input { width: 100%; padding: 14px; border: 2px solid #e8f5ee; border-radius: 10px; font-size: 1.1em; outline: none; transition: border-color 0.3s; text-align: center; font-weight: bold; letter-spacing: 2px; }
        .verify-input:focus { border-color: #00b894; }
        .verify-error { color: #e74c3c; font-size: 0.88em; margin-top: 10px; display: none; font-weight: 500; }

        .saved-badge { display: inline-flex; align-items: center; gap: 6px; background: #f0faf6; color: #00b894; padding: 6px 14px; border-radius: 20px; font-size: 0.8em; margin-bottom: 16px; font-weight: 500; }

        /* 结果页 */
        .result-page { display: none; }
        .result-header { text-align: center; margin-bottom: 28px; }
        .result-city-emoji { font-size: 3.5em; margin-bottom: 12px; }
        .result-city { font-size: 2.2em; font-weight: bold; color: #2d3436; margin-bottom: 6px; }
        .result-slogan { color: #636e72; font-size: 1em; margin-bottom: 12px; font-style: italic; }
        .result-match { color: #00b894; font-size: 1.2em; font-weight: bold; }

        .result-card { background: #f8fcfa; border-radius: 16px; padding: 26px; margin-bottom: 20px; border: 1px solid #e8f5ee; text-align: left; }
        .result-card h3 { color: #2d3436; margin-bottom: 16px; font-size: 1.1em; font-weight: 600; }
        .result-card p { color: #2d3436; line-height: 1.9; font-size: 0.95em; }

        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px; }
        .profile-item { background: white; padding: 14px 16px; border-radius: 10px; border: 1px solid #e8f5ee; }
        .profile-item .p-label { font-size: 0.78em; color: #95a5a6; margin-bottom: 6px; }
        .profile-item .p-value { font-size: 1em; color: #00b894; font-weight: 600; }

        .dimension-analysis { margin-top: 16px; }
        .dim-detail { margin-bottom: 16px; }
        .dim-detail:last-child { margin-bottom: 0; }
        .dim-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .dim-detail-name { color: #2d3436; font-weight: 500; font-size: 0.92em; }
        .dim-detail-score { color: #00b894; font-weight: bold; font-size: 0.92em; }
        .dim-detail-bar { height: 8px; background: #e8f5ee; border-radius: 5px; overflow: hidden; }
        .dim-detail-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #00b894, #00cec9); transition: width 1.5s ease; }

        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .tag { background: #e8f5ee; color: #00b894; padding: 6px 14px; border-radius: 16px; font-size: 0.85em; font-weight: 500; }

        .other-city-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: white; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e8f5ee; }
        .other-city-item:last-child { margin-bottom: 0; }
        .other-city-info { display: flex; align-items: center; gap: 10px; color: #2d3436; font-size: 0.95em; }
        .other-city-rank { color: #95a5a6; font-size: 0.85em; }
        .match-percent { color: #00b894; font-weight: bold; font-size: 0.95em; }

        .restart-btn { background: linear-gradient(135deg, #00b894, #00cec9); color: white; border: none; padding: 14px 40px; font-size: 1em; border-radius: 50px; cursor: pointer; margin-top: 24px; transition: all 0.3s ease; }
        .restart-btn:hover { transform: translateY(-2px); }
        .home-btn { background: none; border: 2px solid #55efc4; color: #00b894; padding: 12px 32px; font-size: 0.95em; border-radius: 50px; cursor: pointer; margin-top: 12px; transition: all 0.3s ease; }
        .home-btn:hover { background: #f0faf6; }
        .button-center { text-align: center; margin-top: 20px; }

        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Toast 提示 */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #2d3436; color: white; padding: 12px 24px; border-radius: 10px; font-size: 0.9em; z-index: 2000; transition: transform 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .start-page h1 { font-size: 1.6em; }
            .question-text { font-size: 1.05em; }
            .btn-group { flex-direction: column; }
            .dimension-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-grid { grid-template-columns: 1fr; }
            .result-city { font-size: 1.8em; }
            .paywall-guarantee { gap: 12px; }
        }
    </style>
</head>
<body>
    <div class='toast' id='toast'></div>

    <div class='container'>
        <div class='start-page' id='startPage'>
            <div class='icon'>🏙️</div>
            <h1>测测适合你的城市</h1>
            <p class='subtitle'>如果城市是一个人<br>谁会是你的灵魂伴侣？</p>

            <div class='info-box'>
                <h4>关于这个测试</h4>
                <p>本测试从六个维度评估你的生活偏好和性格特质，并从20座中国城市中为你匹配最适合的那一座。每座城市都有独特的气质和生活节奏，找到与你最契合的城市。</p>
            </div>

            <div class='dimension-grid'>
                <div class='dim-item'><div class='num'>维度 1</div><div class='name'>生活节奏</div></div>
                <div class='dim-item'><div class='num'>维度 2</div><div class='name'>审美取向</div></div>
                <div class='dim-item'><div class='num'>维度 3</div><div class='name'>环境偏好</div></div>
                <div class='dim-item'><div class='num'>维度 4</div><div class='name'>社交倾向</div></div>
                <div class='dim-item'><div class='num'>维度 5</div><div class='name'>事业追求</div></div>
                <div class='dim-item'><div class='num'>维度 6</div><div class='name'>口味偏好</div></div>
            </div>

            <p style='color:#636e72;font-size:0.9em;margin-bottom:24px;line-height:1.6;'>
                共 24 道题目，预计用时 3 分钟<br>请根据你的真实感受作答
            </p>

            <button class='start-btn' onclick='startQuiz()'>开始测试</button>

            <p class='disclaimer'>本测试仅供参考和娱乐<br>适合你的城市是你心之所向的地方</p>
        </div>

        <div class='question-page' id='questionPage'>
             <div class='progress-container'>
                <div class='progress-info'>
                    <span id='progressText'>第 1 / 24 题</span>
                    <span id='progressPercent'>0%</span>
                </div>
                <div class='progress-bar'>
                    <div class='progress-fill' id='progressFill'></div>
                </div>
            </div>

            <div id='questionArea' class='fade-in'>
                <span class='dim-tag' id='dimTag'>生活节奏</span>
                <p class='question-scenario' id='questionScenario'></p>
                <div class='question-text' id='questionText'></div>
                <div class='options' id='optionsArea'></div>
                <div class='auto-next-hint' id='autoNextHint'>已选择，正在跳转下一题...</div>
            </div>

            <div class='btn-group'>
                <button class='btn btn-prev' id='prevBtn' onclick='prevQuestion()' disabled>上一题</button>
                <button class='btn btn-next' id='nextBtn' onclick='nextQuestion()' disabled>下一题</button>
            </div>
        </div>

        <div class='loading-page' id='loadingPage'>
            <div class='loading-spinner'></div>
            <div class='loading-text' id='loadingText'>正在为你匹配最合适的城市...</div>
        </div>

        <div class='paywall-page' id='paywallPage'></div>

        <div class='result-page' id='resultPage'></div>
    </div>

    <script>
        // ==================== 题目数据及城市数据 ====================
        // （这部分因为非常长，为了代码简洁我在这里省略了，你直接保留你原来的 questionsRaw 和 cities 对象即可！）
        // 请在此处保留你原来的 const dimNames, questionsRaw 和 cities
        /* --- 请在这里粘回你原有的题库和城市数据 --- */

        // 为了保证代码可直接运行演示，我放置一个简化版的占位数据，实际请用你的完整数据覆盖这里
        const dimNames = { tempo: '生活节奏', soul: '审美取向', nature: '环境偏好', social: '社交倾向', ambition: '事业追求', taste: '口味偏好' };
        const dimCodes = ['tempo', 'soul', 'nature', 'social', 'ambition', 'taste'];
        // 注意：将你的 questionsRaw 和 cities 放回这里
        const questionsRaw = [{ dim: 'tempo', scenario: '测试题目加载', q: '你看到了这个说明代码没粘全', options: [ { text: '替换回我原来的题库', scores: { tempo: 9 } } ] }];
        const cities = { beijing: { name: '北京', emoji: '🏯', slogan: '请替换回原数据', profile: { tempo: 7, soul: 8, nature: 4, social: 6, ambition: 9, taste: 6 }, analysis: '略', tags: ['略'] } };


        // ==================== 全局变量 ====================
        let currentQuestion = 0;
        let answers = [];
        let questions = [];
        let autoNextTimer = null;
        let calculatedResult = null;

        // ==================== 工具函数 ====================
        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function showToast(msg, duration = 2000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // ==================== 本地存储管理 ====================
        const STORAGE_KEY = 'city_quiz_data';

        function saveState() {
            const data = {
                answers: answers,
                questions: questions,
                currentQuestion: currentQuestion,
                calculatedResult: calculatedResult,
                paid: false,
                timestamp: Date.now()
            };
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
        }

        function savePaidState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    data.paid = true;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                }
            } catch(e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (Date.now() - data.timestamp > 24 * 60 * 60 * 1000) {
                    localStorage.removeItem(STORAGE_KEY);
                    return null;
                }
                return data;
            } catch(e) { return null; }
        }

        function clearState() { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} }

        // ==================== 初始化与核心逻辑 ====================
        function initQuestions() {
            const byDim = {};
            dimCodes.forEach(d => byDim[d] = []);
            questionsRaw.forEach(q => byDim[q.dim].push(q));
            questions = [];
            for (let d of dimCodes) byDim[d] = shuffleArray(byDim[d]);
            for (let i = 0; i < 4; i++) {
                for (let d of dimCodes) {
                    if (byDim[d][i]) {
                        const q = byDim[d][i];
                        questions.push({
                            dim: q.dim, scenario: q.scenario, q: q.q,
                            options: shuffleArray(q.options.map(o => ({...o})))
                        });
                    }
                }
            }
        }

        window.addEventListener('load', () => {
            const saved = loadState();
            if (saved && saved.calculatedResult) {
                questions = saved.questions;
                answers = saved.answers;
                calculatedResult = saved.calculatedResult;

                if (saved.paid) {
                    document.getElementById('startPage').style.display = 'none';
                    showFullResult();
                    showToast('已恢复你的测试结果 ✓');
                } else {
                    document.getElementById('startPage').style.display = 'none';
                    showPaywall();
                    showToast('已恢复测试进度，请输入密码查看结果');
                }
            }
        });

        function startQuiz() {
            initQuestions();
            answers = new Array(questions.length).fill(undefined);
            currentQuestion = 0;
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('questionPage').style.display = 'block';
            showQuestion(0);
        }

        function showQuestion(idx) {
            const q = questions[idx];
            document.getElementById('dimTag').textContent = dimNames[q.dim];
            document.getElementById('questionScenario').textContent = q.scenario;
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('progressText').textContent = `第 ${idx+1} / ${questions.length} 题`;
            const pct = Math.round(idx / questions.length * 100);
            document.getElementById('progressPercent').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';

            const area = document.getElementById('optionsArea');
            area.innerHTML = '';

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (answers[idx] === i ? ' selected' : '');
                div.innerHTML = `<div class='option-radio'></div><div class='option-text'>${opt.text}</div>`;
                div.onclick = () => selectOption(idx, i);
                area.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? '查看结果' : '下一题';
            document.getElementById('nextBtn').disabled = answers[idx] === undefined;
            document.getElementById('autoNextHint').classList.remove('show');

            const qa = document.getElementById('questionArea');
            qa.classList.remove('fade-in');
            void qa.offsetWidth;
            qa.classList.add('fade-in');
        }

        function selectOption(qIdx, optIdx) {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            const isFirst = answers[qIdx] === undefined;
            answers[qIdx] = optIdx;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.className = 'option' + (i === optIdx ? ' selected' : '');
            });
            document.getElementById('nextBtn').disabled = false;
            if (isFirst && qIdx < questions.length - 1) {
                document.getElementById('autoNextHint').classList.add('show');
                autoNextTimer = setTimeout(() => {
                    document.getElementById('autoNextHint').classList.remove('show');
                    nextQuestion();
                }, 600);
            }
        }

        function nextQuestion() {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            } else {
                showLoading();
            }
        }

        function prevQuestion() {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            if (currentQuestion > 0) { currentQuestion--; showQuestion(currentQuestion); }
        }

        function showLoading() {
            document.getElementById('questionPage').style.display = 'none';
            document.getElementById('loadingPage').style.display = 'block';

            const texts = ['正在分析你的生活偏好...', '正在匹配城市性格特征...', '正在计算六维契合度...', '即将揭晓你的灵魂城市...'];
            let ti = 0;
            const loadingTextEl = document.getElementById('loadingText');
            const textTimer = setInterval(() => {
                ti++;
                if (ti < texts.length) loadingTextEl.textContent = texts[ti];
            }, 700);

            setTimeout(() => {
                clearInterval(textTimer);
                calculatedResult = calculateResult();
                saveState();
                showPaywall();
            }, 3000);
        }

        function calculateResult() {
            const userScores = {};
            dimCodes.forEach(d => userScores[d] = 0);

            answers.forEach((ans, i) => {
                if (ans === undefined) return;
                const opt = questions[i].options[ans];
                if (opt.scores) {
                    for (const [k, v] of Object.entries(opt.scores)) {
                        userScores[k] = (userScores[k] || 0) + v;
                    }
                }
            });

            const userProfile = {};
            dimCodes.forEach(d => {
                userProfile[d] = Math.min(10, Math.max(0, Math.round(userScores[d] / 3)));
            });

            let cityMatches = [];
            for (const [key, city] of Object.entries(cities)) {
                let diff = 0;
                let total = 0;
                dimCodes.forEach(d => {
                    const d1 = userProfile[d] || 5;
                    const d2 = city.profile[d] || 5;
                    diff += Math.abs(d1 - d2);
                    total += 10;
                });
                const matchScore = Math.round((1 - diff / total) * 100);
                cityMatches.push({ key, city, matchScore });
            }

            cityMatches.sort((a, b) => b.matchScore - a.matchScore);
            return { userProfile, cityMatches, topCity: cityMatches[0] };
        }

        // ==================== 公众号验证墙 (核心修改点) ====================
        function showPaywall() {
            document.getElementById('loadingPage').style.display = 'none';
            const p = document.getElementById('paywallPage');
            p.style.display = 'block';
            p.classList.add('fade-in');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            p.innerHTML = `
                <h2>匹配完成</h2>
                <p class='subtitle'>你的灵魂城市已找到</p>

                <div class='saved-badge'>💾 答题记录已自动保存</div>

                <div class='paywall-preview'>
                    <div class='preview-city-name'>你的命定之城已揭晓</div>
                    <div class='preview-desc'>完整报告包含六维生活画像、城市深度解读和详细的匹配分析</div>
                </div>

                <div class='paywall-lock'>🔒</div>
                <p style='color:#2d3436;font-weight:500;font-size:1.05em;'>解锁你的专属城市报告</p>

                <div class='paywall-features'>
                    <div class='feature-item'><span class='check-icon'>✓</span><span>你的最佳匹配城市及匹配度</span></div>
                    <div class='feature-item'><span class='check-icon'>✓</span><span>六维生活画像分析</span></div>
                    <div class='feature-item'><span class='check-icon'>✓</span><span>城市深度性格解读</span></div>
                    <div class='feature-item'><span class='check-icon'>✓</span><span>TOP5 推荐城市排行</span></div>
                </div>

                <div class='pay-env-tip'>
                    <span class='tip-title'>🟢 获取解锁密码说明</span>
                    <p style='color:#636e72; font-size:14px; line-height:1.8;'>
                        1. 微信搜索关注公众号：<strong style="color:#00b894;">【你的公众号名称】</strong><br>
                        2. 在公众号后台回复关键词：<strong style="color:#00b894;">城市</strong><br>
                        3. 复制公众号自动回复的密码，在下方输入即可解锁。
                    </p>
                </div>

                <div class='qr-container'>
                    <img src="https://img.alicdn.com/imgextra/i3/O1CN01xO420s1P6L38Vd221_!!6000000001793-2-tps-200-200.png" alt="公众号二维码" class="qr-code">
                    <p style="color:#95a5a6; font-size: 0.85em; margin-top: 12px;">长按或截图保存二维码<br>微信扫一扫快速关注</p>
                </div>

                <div class='verify-section'>
                    <label>🔑 请输入公众号回复的验证密码：</label>
                    <input type='text' id='myCodeInput' placeholder='输入密码秒开报告' class='verify-input'>
                    
                    <button class='pay-btn-dark' onclick='checkMyCode()'>
                        验证密码并查看报告
                    </button>
                    <p id='errorMsg' class='verify-error'>验证密码错误，请检查是否输入正确</p>
                </div>
            `;
        }

        // ==================== 验证唯一密码逻辑 ====================
        function checkMyCode() {
            // 获取用户输入的密码（去除首尾空格）
            const inputCode = document.getElementById('myCodeInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            // ⚠️【替换重要】这里设置你公众号后台自动回复的那个“唯一验证密码”
            // 比如你在公众号设置了回复"城市"，自动回复内容为："感谢关注！解锁密码是：8888"
            // 那么这里的 validPassword 就填 '8888'
            const validPassword = '8888';

            if (inputCode === validPassword) {
                errorMsg.style.display = 'none';
                savePaidState(); // 更新 LocalStorage 为已解锁
                document.getElementById('paywallPage').style.display = 'none';
                showFullResult();
                showToast('解锁成功！正在为您生成精美报告 🎉');
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // ==================== 结果页显示 ====================
        function showFullResult() {
            const { userProfile, cityMatches, topCity } = calculatedResult;
            const rp = document.getElementById('resultPage');
            rp.style.display = 'block';
            rp.classList.add('fade-in');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const tc = topCity.city;
            const matchPct = Math.min(98, Math.max(72, topCity.matchScore + Math.floor(Math.random()*5)));
            const dimLabels = ['生活节奏', '审美取向', '环境偏好', '社交倾向', '事业追求', '口味偏好'];

            let dimHTML = '';
            dimCodes.forEach((d, i) => {
                const val = Math.min(100, Math.max(10, (userProfile[d] || 5) * 10));
                dimHTML += `
                    <div class='dim-detail'>
                        <div class='dim-detail-header'>
                            <span class='dim-detail-name'>${dimLabels[i]}</span>
                            <span class='dim-detail-score'>${val}%</span>
                        </div>
                        <div class='dim-detail-bar'>
                            <div class='dim-detail-fill' style='width:0%;' data-width='${val}%'></div>
                        </div>
                    </div>`;
            });

            const profileValues = [
                userProfile.tempo > 5 ? '快节奏' : '慢生活',
                userProfile.soul > 5 ? '文艺浪漫' : '务实接地气',
                userProfile.nature > 5 ? '亲近自然' : '都市生活',
                userProfile.social > 5 ? '社交达人' : '独处爱好者',
                userProfile.ambition > 5 ? '拼搏进取' : '安稳幸福',
                userProfile.taste > 5 ? '重口味' : '清淡系'
            ];

            let profileHTML = '';
            dimLabels.forEach((l, i) => {
                profileHTML += `<div class='profile-item'><div class='p-label'>${l}</div><div class='p-value'>${profileValues[i]}</div></div>`;
            });

            let tagsHTML = tc.tags.map(t => `<span class='tag'>${t}</span>`).join('');

            let otherHTML = '';
            for (let i = 1; i <= Math.min(4, cityMatches.length - 1); i++) {
                const c = cityMatches[i];
                const p = Math.min(95, Math.max(50, c.matchScore + Math.floor(Math.random()*5)));
                otherHTML += `<div class='other-city-item'><div class='other-city-info'><span class='other-city-rank'>#${i+1}</span><span>${c.city.emoji} ${c.city.name}</span></div><span class='match-percent'>${p}%</span></div>`;
            }

            rp.innerHTML = `
                <div class='result-header'>
                    <div class='result-city-emoji'>${tc.emoji}</div>
                    <div class='result-city'>${tc.name}</div>
                    <div class='result-slogan'>${tc.slogan}</div>
                    <div class='result-match'>匹配度 ${matchPct}%</div>
                </div>

                <div class='result-card'>
                    <h3>你的生活画像</h3>
                    <div class='profile-grid'>${profileHTML}</div>
                </div>

                <div class='result-card'>
                    <h3>为什么是${tc.name}</h3>
                    <p>${tc.analysis}</p>
                </div>

                <div class='result-card'>
                    <h3>六维度详细分析</h3>
                    <div class='dimension-analysis'>${dimHTML}</div>
                </div>

                <div class='result-card'>
                    <h3>城市标签</h3>
                    <div class='tags'>${tagsHTML}</div>
                </div>

                <div class='result-card'>
                    <h3>其他适合你的城市</h3>
                    ${otherHTML}
                </div>

                <div class='result-card' style='background:#f0faf6;border-color:#d0ede0;'>
                    <h3>温馨寄语</h3>
                    <p>每座城市都有它独特的魅力与温度。测试结果是一种有趣的参考，而真正适合你的地方，是那个让你心生欢喜、愿意为之努力的地方。</p>
                </div>

                <div class='button-center'>
                    <button class='restart-btn' onclick='restart()'>重新测试</button>
                    <br>
                    <button class='home-btn' onclick='location.reload()'>刷新页面</button>
                </div>
            `;

            setTimeout(() => {
                document.querySelectorAll('.dim-detail-fill').forEach(el => {
                    el.style.width = el.dataset.width;
                });
            }, 300);
        }

        function restart() {
            currentQuestion = 0;
            answers = [];
            calculatedResult = null;
            clearState();
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('paywallPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

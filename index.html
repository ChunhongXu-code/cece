<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测适合你的城市</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c, #fda085);
        }

        /* 开始页面 */
        .start-page {
            text-align: center;
            padding: 40px 0;
        }

        .start-page h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .start-page .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .start-page .desc {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .start-page .emoji-row {
            font-size: 2.5em;
            margin-bottom: 30px;
            letter-spacing: 8px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        /* 进度条 */
        .progress-container {
            margin-bottom: 30px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #888;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* 问题区域 */
        .question-page {
            display: none;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 36px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 1.25em;
            color: #333;
            margin-bottom: 28px;
            line-height: 1.7;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            color: #555;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            color: #333;
            font-weight: 500;
        }

        .option.selected::before {
            content: '✓';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-weight: bold;
            font-size: 1.2em;
        }

        .option-label {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.75em;
            margin-right: 12px;
            font-weight: bold;
        }

        .option.selected .option-label {
            background: #764ba2;
        }

        /* 按钮区域 */
        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-prev {
            background: #f0f0f0;
            color: #666;
        }

        .btn-prev:hover {
            background: #e0e0e0;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 结果页面 */
        .result-page {
            display: none;
            text-align: center;
        }

        .result-city-emoji {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .result-city {
            font-size: 2.4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .result-slogan {
            color: #888;
            font-size: 1.05em;
            margin-bottom: 28px;
            font-style: italic;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 24px;
            text-align: left;
        }

        .result-card h3 {
            color: #444;
            margin-bottom: 14px;
            font-size: 1.15em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card p {
            color: #555;
            line-height: 1.9;
            font-size: 0.95em;
        }

        .dimension-bars {
            margin-top: 24px;
        }

        .dimension-item {
            margin-bottom: 16px;
        }

        .dimension-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: #555;
        }

        .dimension-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        .dimension-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s ease;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .tag {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .other-cities {
            margin-top: 8px;
        }

        .other-cities h3 {
            color: #444;
            margin-bottom: 16px;
            font-size: 1.1em;
        }

        .other-city-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .other-city-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .other-city-rank {
            color: #999;
            font-size: 0.85em;
        }

        .match-percent {
            color: #667eea;
            font-weight: bold;
            font-size: 0.95em;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.05em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .share-hint {
            margin-top: 16px;
            color: #aaa;
            font-size: 0.85em;
        }

        /* 加载动画 */
        .loading-page {
            display: none;
            text-align: center;
            padding: 60px 0;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e9ecef;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 1.1em;
        }

        /* ========== 付费墙样式 ========== */
        .paywall-page {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .paywall-page h2 {
            font-size: 1.6em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .paywall-preview {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 18px;
            padding: 24px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .paywall-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, rgba(255,255,255,0.95));
        }

        .paywall-preview .preview-city {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .paywall-preview .preview-text {
            color: #888;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .paywall-lock {
            font-size: 3em;
            margin: 20px 0 10px;
        }

        .paywall-price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
        }

        .price-original {
            color: #ccc;
            text-decoration: line-through;
            font-size: 1.1em;
        }

        .price-current {
            color: #f5576c;
            font-size: 2em;
            font-weight: bold;
        }

        .price-tag {
            background: #f5576c;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
        }

        .paywall-features {
            text-align: left;
            background: #f8f9fa;
            border-radius: 14px;
            padding: 20px;
            margin: 20px 0;
        }

        .paywall-features .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            color: #555;
            font-size: 0.95em;
        }

        .paywall-features .feature-item::before {
            content: '✅';
        }

        .pay-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .pay-btn {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pay-btn-wechat {
            background: #07c160;
            color: white;
            box-shadow: 0 4px 15px rgba(7, 193, 96, 0.3);
        }

        .pay-btn-wechat:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(7, 193, 96, 0.4);
        }

        .pay-btn-free {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .pay-btn-free:hover {
            transform: translateY(-2px);
        }

        .qrcode-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .qrcode-modal.show {
            display: flex;
        }

        .qrcode-content {
            background: white;
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            position: relative;
        }

        .qrcode-content h3 {
            margin-bottom: 16px;
            color: #333;
        }

        .qrcode-content p {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .qrcode-placeholder {
            width: 200px;
            height: 200px;
            background: #f0f0f0;
            border: 3px dashed #ccc;
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.85em;
            flex-direction: column;
            gap: 8px;
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .confirm-paid-btn {
            background: #07c160;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .confirm-paid-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        }

        .paywall-note {
            color: #bbb;
            font-size: 0.8em;
            margin-top: 16px;
            line-height: 1.6;
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .start-page h1 {
                font-size: 1.7em;
            }

            .question-text {
                font-size: 1.1em;
            }

            .result-city {
                font-size: 1.9em;
            }

            .btn-group {
                flex-direction: column;
            }

            .qrcode-content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div class="start-page" id="startPage">
            <div class="emoji-row">🏙️ 🌿 🌊 🏔️</div>
            <h1>测测适合你的城市</h1>
            <p class="subtitle">每个人心中都有一座理想城市<br>让我们一起发现最适合你的那一座</p>
            <p class="desc">共 30 道题目 · 预计用时 5 分钟<br>所有题目没有对错之分，请跟随内心选择 💫</p>
            <button class="start-btn" onclick="startQuiz()">开始探索 →</button>
        </div>

        <!-- 问题页面 -->
        <div class="question-page" id="questionPage">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">第 1 / 30 题</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div id="questionArea" class="fade-in">
                <div class="question-number" id="questionNum">1</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsArea"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()" disabled>← 上一题</button>
                <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
            </div>
        </div>

        <!-- 加载页面 -->
        <div class="loading-page" id="loadingPage">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在分析你的城市匹配度...</div>
        </div>

        <!-- 付费墙页面 -->
        <div class="paywall-page" id="paywallPage"></div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage"></div>
    </div>

    <script>
        // ==================== 问题数据 ====================
        const questions = [
            {
                q: "你更喜欢怎样的气候环境？",
                options: [
                    { text: "四季分明，能感受每个季节的变换", scores: { north: 3, east: 2 } },
                    { text: "温暖湿润，一年中大部分时间都很舒适", scores: { south: 3, southwest: 2 } },
                    { text: "干燥少雨，阳光充沛的日子", scores: { northwest: 3, north: 1 } },
                    { text: "凉爽宜人，不太冷也不太热", scores: { southwest: 3, east: 1 } }
                ]
            },
            {
                q: "周末你最想做的事是什么？",
                options: [
                    { text: "逛展览、看演出、参加文化活动", scores: { culture: 3, tier1: 2 } },
                    { text: "爬山徒步，亲近大自然", scores: { nature: 3, southwest: 2 } },
                    { text: "和朋友聚餐，探索美食小店", scores: { food: 3, south: 1 } },
                    { text: "宅在家看书、看电影，享受安静时光", scores: { peace: 3, tier2: 2 } }
                ]
            },
            {
                q: "你对工作节奏的期望是？",
                options: [
                    { text: "快节奏、高挑战，追求快速成长", scores: { tier1: 3, career: 3 } },
                    { text: "适中的节奏，兼顾工作与个人生活", scores: { tier2: 3, east: 1 } },
                    { text: "相对从容，有更多时间享受生活", scores: { peace: 3, southwest: 2 } },
                    { text: "弹性自由，能按自己的方式安排", scores: { creative: 3, south: 1 } }
                ]
            },
            {
                q: "你心目中理想的居住环境是？",
                options: [
                    { text: "繁华都市中心，出门就是便利与热闹", scores: { tier1: 3, north: 1 } },
                    { text: "城市近郊，兼具便利与宁静", scores: { tier2: 2, east: 2 } },
                    { text: "依山傍水，推窗即是自然风景", scores: { nature: 3, southwest: 3 } },
                    { text: "有历史底蕴的老城区，充满烟火气", scores: { culture: 2, food: 2, south: 1 } }
                ]
            },
            {
                q: "你对美食的偏好是？",
                options: [
                    { text: "喜欢麻辣鲜香，越辣越开心", scores: { southwest: 3, food: 2 } },
                    { text: "偏爱清淡精致，注重食材本味", scores: { east: 3, south: 2 } },
                    { text: "喜欢面食和各种北方家常菜", scores: { north: 3, northwest: 2 } },
                    { text: "中西餐都喜欢，喜欢尝试各种风味", scores: { tier1: 2, culture: 2 } }
                ]
            },
            {
                q: "你更看重城市的哪个方面？",
                options: [
                    { text: "丰富的就业机会和发展平台", scores: { tier1: 3, career: 3 } },
                    { text: "优质的教育和医疗资源", scores: { tier1: 2, east: 2 } },
                    { text: "良好的生态环境和空气质量", scores: { nature: 3, southwest: 2, south: 1 } },
                    { text: "深厚的文化底蕴和人文氛围", scores: { culture: 3, north: 1 } }
                ]
            },
            {
                q: "出行方式上，你更倾向于？",
                options: [
                    { text: "地铁公交，高效便捷的公共交通", scores: { tier1: 3 } },
                    { text: "骑自行车或步行，低碳又健康", scores: { peace: 2, nature: 1, tier2: 1 } },
                    { text: "自己开车，自由安排路线", scores: { tier2: 2, northwest: 1 } },
                    { text: "都可以，方便就好", scores: { east: 1, south: 1 } }
                ]
            },
            {
                q: "你喜欢怎样的社交方式？",
                options: [
                    { text: "参加各类社群活动，认识不同领域的人", scores: { tier1: 2, creative: 2 } },
                    { text: "和三五好友小聚，深度交流", scores: { peace: 2, tier2: 2 } },
                    { text: "热闹的聚会和社交场合让我开心", scores: { south: 2, food: 1 } },
                    { text: "享受独处，偶尔社交就好", scores: { peace: 3, nature: 1 } }
                ]
            },
            {
                q: "你对城市生活成本的态度是？",
                options: [

            },
            qingdao: {
                name: "青岛",

                slogan: "红瓦绿树，碧海蓝天",
                conditions: { north: 2, coastal: 3, nature: 2, peace: 1, east: 1 },
                analysis: "青岛是一座兼具北方大气与海洋浪漫的城市。红瓦绿树、碧海蓝天的城市画面深入人心。你对海洋的向往、对有品质生活的追求，在青岛可以得到很好的满足。这座城市有德式建筑的异域风情、有新鲜的海鲜美食、有宜人的夏季气候。青岛会给你一种既能努力工作又能诗意栖居的美好生活。",
                tags: ["海滨城市", "啤酒文化", "宜居环境", "海鲜美食", "浪漫气质"],
                dimensions: { career: 62, culture: 65, life: 85, nature: 88, food: 80 }
            },
            lhasa: {
                name: "拉萨",
                emoji: "🏔️",
                slogan: "日光之城，心灵故乡",
                conditions: { northwest: 3, nature: 3, peace: 3, culture: 2 },
                analysis: "拉萨是一座让灵魂得到洗礼的城市。湛蓝的天空、神圣的布达拉宫、虔诚的转经人，构成了一幅纯净而震撼的画面。你对内心宁静的追求、对自然与精神世界的向往，与拉萨的气质深度共鸣。在这座日光之城，你会发现生活可以回归最本真的模样。拉萨教会你的，是在广阔天地间找到内心真正的自由与平静。",
                tags: ["纯净圣洁", "信仰之地", "壮美风光", "心灵净土", "独特文化"],
                dimensions: { career: 30, culture: 85, life: 70, nature: 100, food: 50 }
            },
            suzhou: {
                name: "苏州",
                emoji: "🏡",
                slogan: "人间烟火，诗意江南",
                conditions: { east: 3, culture: 2, peace: 2, nature: 1, tier2: 2 },
                analysis: "苏州是一座将古典韵味与现代活力完美融合的城市。精致的园林、悠长的小巷、温软的吴侬软语，让这座城市充满了独特的魅力。你对精致生活的追求、对文化与自然和谐共处的向往，与苏州的城市精神高度一致。在这里，你可以在拙政园感受匠心之美，也可以在工业园区追逐创新梦想。苏州告诉你，美好的生活可以是诗意与务实的完美结合。",
                tags: ["园林之城", "江南韵味", "经济发达", "精致生活", "宜居宜业"],
                dimensions: { career: 75, culture: 88, life: 88, nature: 78, food: 80 }
            }
        };

        // ==================== 全局变量 ====================
        let currentQuestion = 0;
        let answers = [];
        let scores = {};
        let hasPaid = false;
        let calculatedResult = null;

        // ==================== 开始测试 ====================
        function startQuiz() {
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('questionPage').style.display = 'block';
            showQuestion(0);
        }

        // ==================== 显示问题 ====================
        function showQuestion(index) {
            const q = questions[index];
            document.getElementById('questionNum').textContent = index + 1;
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('progressText').textContent = `第 ${index + 1} / ${questions.length} 题`;
            document.getElementById('progressPercent').textContent = Math.round((index / questions.length) * 100) + '%';
            document.getElementById('progressFill').style.width = (index / questions.length * 100) + '%';

            const optionsArea = document.getElementById('optionsArea');
            optionsArea.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D'];

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (answers[index] === i ? ' selected' : '');
                div.innerHTML = `<span class="option-label">${labels[i]}</span>${opt.text}`;
                div.onclick = () => selectOption(index, i);
                optionsArea.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = answers[index] === undefined;
            document.getElementById('nextBtn').textContent = index === questions.length - 1 ? '查看结果 🎉' : '下一题 →';

            const questionArea = document.getElementById('questionArea');
            questionArea.classList.remove('fade-in');
            void questionArea.offsetWidth;
            questionArea.classList.add('fade-in');
        }

        function selectOption(qIndex, optIndex) {
            answers[qIndex] = optIndex;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.className = 'option' + (i === optIndex ? ' selected' : '');
            });
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            } else {
                showLoading();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        // ==================== 加载页面 ====================
        function showLoading() {
            document.getElementById('questionPage').style.display = 'none';
            document.getElementById('loadingPage').style.display = 'block';

            setTimeout(() => {
                calculatedResult = calculateResult();
                showPaywall(calculatedResult);
            }, 2500);
        }

        // ==================== 计算结果 ====================
        function calculateResult() {
            scores = {};
            answers.forEach((ansIdx, qIdx) => {
                const option = questions[qIdx].options[ansIdx];
                if (option.scores) {
                    for (const [key, value] of Object.entries(option.scores)) {
                        scores[key] = (scores[key] || 0) + value;
                    }
                }
            });

            let cityScores = {};
            for (const [cityKey, city] of Object.entries(cities)) {
                let matchScore = 0;
                for (const [dim, weight] of Object.entries(city.conditions)) {
                    matchScore += (scores[dim] || 0) * weight;
                }
                cityScores[cityKey] = matchScore;
            }

            const sortedCities = Object.entries(cityScores).sort((a, b) => b[1] - a[1]);
            const maxScore = sortedCities[0][1];
            const topCityKey = sortedCities[0][0];
            const topCity = cities[topCityKey];

            return { topCity, sortedCities, maxScore };
        }

        // ==================== 付费墙 ====================
        function showPaywall(result) {
            document.getElementById('loadingPage').style.display = 'none';
            const paywallPage = document.getElementById('paywallPage');
            paywallPage.style.display = 'block';
            paywallPage.classList.add('fade-in');

            paywallPage.innerHTML = `
                <h2>🎊 分析完成！</h2>
                <p style="color: #888; margin-bottom: 20px;">我们已经找到最适合你的城市</p>

                <div class="paywall-preview">
                    <div class="preview-city">${result.topCity.emoji}</div>
                    <div style="font-size: 1.5em; font-weight: bold; color: #667eea; margin-bottom: 8px;">
                        你的命定之城已揭晓
                    </div>
                    <div class="preview-text">
                        包含详细的城市匹配分析、五维雷达图、<br>
                        城市生活指南及更多推荐城市...
                    </div>
                </div>

                <div class="paywall-lock">🔓</div>
                <p style="color: #555; font-weight: 500; font-size: 1.05em;">解锁你的专属城市报告</p>

                <div class="paywall-price">
                    <span class="price-original">¥9.9</span>
                    <span class="price-current">¥1.9</span>
                    <span class="price-tag">限时优惠</span>
                </div>

                <div class="paywall-features">
                    <div class="feature-item">你的最佳匹配城市及匹配度</div>
                    <div class="feature-item">详细的性格与城市契合度分析</div>
                    <div class="feature-item">五维城市雷达图</div>
                    <div class="feature-item">TOP5 推荐城市排行</div>
                    <div class="feature-item">专属城市标签和温馨寄语</div>
                </div>

                <div class="pay-methods">
                    <button class="pay-btn pay-btn-wechat" onclick="showQRCode('pay')">
                        💚 微信扫码支付 ¥1.9
                    </button>
                    <button class="pay-btn pay-btn-free" onclick="showQRCode('follow')">
                        🎁 关注公众号免费解锁
                    </button>
                </div>

                <p class="paywall-note">
                    本测试仅供娱乐参考<br>
                    如有问题请联系客服微信：your_wechat_id
                </p>

                <!-- 二维码弹窗 -->
                <div class="qrcode-modal" id="qrcodeModal">
                    <div class="qrcode-content">
                        <button class="close-modal" onclick="closeQRCode()">×</button>
                        <h3 id="modalTitle">微信扫码支付</h3>
                        <div class="qrcode-placeholder" id="qrcodePlaceholder">
                            <span style="font-size: 2em;">📱</span>
                            <span>在此放置你的二维码</span>
                        </div>
                        <p id="modalDesc">扫码支付 ¥1.9 后点击下方按钮</p>
                        <button class="confirm-paid-btn" onclick="confirmPaid()">✅ 我已完成付款 / 已关注</button>
                    </div>
                </div>
            `;
        }

        function showQRCode(type) {
            const modal = document.getElementById('qrcodeModal');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const placeholder = document.getElementById('qrcodePlaceholder');

            if (type === 'pay') {
                title.textContent = '微信扫码支付';
                desc.innerHTML = '扫码支付 ¥1.9 后<br>点击下方按钮查看结果';
                placeholder.innerHTML = `
                    <span style="font-size: 2em;">💰</span>
                    <span>在此放置收款码图片</span>
                    <span style="font-size: 0.75em;">将此处替换为你的微信收款码</span>
                `;
                /*
                ============================================
                👇 替换为你自己的收款码图片 👇
                ============================================
                placeholder.innerHTML = '<img src="微信图片_20260508214323_987_5.png" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">';

                如果图片在本地，和index.html放同一文件夹：
                placeholder.innerHTML = '<img src="pay-qrcode.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">';
                ============================================
                */
            } else {
                title.textContent = '关注公众号免费解锁';
                desc.innerHTML = '长按识别关注公众号后<br>点击下方按钮查看结果';
                placeholder.innerHTML = `
                    <span style="font-size: 2em;">📲</span>
                    <span>在此放置公众号二维码</span>
                    <span style="font-size: 0.75em;">将此处替换为你的公众号二维码</span>
                `;
                /*
                ============================================
                👇 替换为你自己的公众号二维码 👇
                ============================================
                placeholder.innerHTML = '<img src="你的公众号二维码网址.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">';
                ============================================
                */
            }

            modal.classList.add('show');
        }

        function closeQRCode() {
            document.getElementById('qrcodeModal').classList.remove('show');
        }

        function confirmPaid() {
            hasPaid = true;
            closeQRCode();
            document.getElementById('paywallPage').style.display = 'none';
            showFullResult(calculatedResult);
        }

        // ==================== 完整结果展示 ====================
        function showFullResult(result) {
            const { topCity, sortedCities, maxScore } = result;
            const resultPage = document.getElementById('resultPage');
            resultPage.style.display = 'block';
            resultPage.classList.add('fade-in');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const topPercent = Math.min(98, Math.max(75, Math.round((sortedCities[0][1] / maxScore) * 95 + Math.random() * 5)));
            const dimColors = ['#667eea', '#f5576c', '#4facfe', '#43e97b', '#fa709a'];
            const dimLabels = ['事业发展', '文化氛围', '生活品质', '自然环境', '美食体验'];

            let dimensionHTML = '';
            Object.entries(topCity.dimensions).forEach(([key, val], i) => {
                dimensionHTML += `
                    <div class="dimension-item">
                        <div class="dimension-label">
                            <span>${dimLabels[i]}</span>
                            <span>${val}%</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-fill" style="width: 0%; background: ${dimColors[i]};" data-width="${val}%"></div>
                        </div>
                    </div>
                `;
            });

            let tagsHTML = topCity.tags.map(t => `<span class="tag">${t}</span>`).join('');

            let otherCitiesHTML = '';
            for (let i = 1; i <= Math.min(4, sortedCities.length - 1); i++) {
                const city = cities[sortedCities[i][0]];
                const percent = Math.min(95, Math.max(50, Math.round((sortedCities[i][1] / maxScore) * 90 + Math.random() * 5)));
                otherCitiesHTML += `
                    <div class="other-city-item">
                        <div class="other-city-info">
                            <span class="other-city-rank">#${i + 1}</span>
                            <span>${city.emoji} ${city.name}</span>
                        </div>
                        <span class="match-percent">${percent}%</span>
                    </div>
                `;
            }

            resultPage.innerHTML = `
                <div class="result-city-emoji">${topCity.emoji}</div>
                <div class="result-city">${topCity.name}</div>
                <div class="result-slogan">"${topCity.slogan}"</div>
                <p style="color: #667eea; font-size: 1.3em; font-weight: bold; margin-bottom: 24px;">
                    匹配度：${topPercent}% ✨
                </p>

                <div class="result-card">
                    <h3>📝 为什么是${topCity.name}？</h3>
                    <p>${topCity.analysis}</p>
                </div>

                <div class="result-card">
                    <h3>📊 城市维度分析</h3>
                    <div class="dimension-bars">
                        ${dimensionHTML}
                    </div>
                </div>

                <div class="result-card">
                    <h3>🏷️ 城市标签</h3>
                    <div class="tags">${tagsHTML}</div>
                </div>

                <div class="result-card other-cities">
                    <h3>🌟 其他适合你的城市</h3>
                    ${otherCitiesHTML}
                </div>

                <div class="result-card" style="background: linear-gradient(135deg, #ffecd2, #fcb69f);">
                    <h3>💝 温馨寄语</h3>
                    <p>每座城市都有它独特的魅力与温度。测试结果是一种有趣的参考，而真正适合你的地方，是那个让你心生欢喜、愿意为之努力的地方。无论你在哪座城市，都请相信：你值得拥有美好的生活，而美好的生活也正在向你走来。愿你在自己热爱的城市里，活出最精彩的人生！🌟</p>
                </div>

                <button class="restart-btn" onclick="restart()">🔄 重新测试</button>
                <p class="share-hint">把结果分享给朋友，看看你们是不是同一座城市的有缘人 😄</p>
            `;

            setTimeout(() => {
                document.querySelectorAll('.dimension-fill').forEach(el => {
                    el.style.width = el.dataset.width;
                });
            }, 300);
        }

        // ==================== 重新测试 ====================
        function restart() {
            currentQuestion = 0;
            answers = [];
            scores = {};
            calculatedResult = null;
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('paywallPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('questionPage').style.display === 'block') {
                if (e.key >= '1' && e.key <= '4') {
                    const idx = parseInt(e.key) - 1;
                    const options = document.querySelectorAll('.option');
                    if (options[idx]) options[idx].click();
                }
                if (e.key === 'ArrowRight' || e.key === 'Enter') {
                    if (!document.getElementById('nextBtn').disabled) nextQuestion();
                }
                if (e.key === 'ArrowLeft') {
                    if (!document.getElementById('prevBtn').disabled) prevQuestion();
                }
            }
            // ESC 关闭弹窗
            if (e.key === 'Escape') {
                closeQRCode();
            }
        });
    </script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>玉米叶面积测定</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f4f0;color:#222;padding-bottom:40px}
    .container{max-width:460px;margin:0 auto;padding:10px}
    .header{background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;text-align:center;padding:12px;border-radius:12px;margin-bottom:10px}
    .header h1{font-size:18px}
    .card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .card h3{font-size:14px;color:#2d6a4f;margin-bottom:8px;border-left:3px solid #2d6a4f;padding-left:7px}
    .form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
    .form-row label{font-size:14px;font-weight:600;white-space:nowrap;min-width:50px}
    .form-row input{flex:1;padding:10px 12px;border:1.5px solid #d0d7de;border-radius:9px;font-size:16px;outline:none;background:#fafcff;min-width:0}
    .form-row input:focus{border-color:#2d6a4f;background:#fff}

    /* 处理+重复同一行 */
    .tr-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
    .tr-row label{font-size:14px;font-weight:600;white-space:nowrap;min-width:50px}
    .tr-row .treat-input{flex:1.2;padding:10px 12px;border:1.5px solid #d0d7de;border-radius:9px;font-size:16px;outline:none;background:#fafcff;min-width:0}
    .tr-row .rep-label{font-size:14px;font-weight:600;color:#666;padding-left:4px}
    .tr-row .rep-input{width:48px;padding:10px 6px;border:1.5px solid #d0d7de;border-radius:9px;font-size:16px;outline:none;background:#fafcff;text-align:center}
    .tr-row .treat-input:focus,.tr-row .rep-input:focus{border-color:#2d6a4f;background:#fff}
    .rep-btns{display:flex;gap:4px;margin-bottom:8px;padding-left:58px}
    .rep-btn{padding:4px 12px;border-radius:8px;font-size:13px;border:1.5px solid #b7e4c7;background:#fff;color:#2d6a4f;cursor:pointer;font-weight:600;flex:none;min-width:auto}
    .rep-btn.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f}

    .btn-row{display:flex;gap:8px;flex-wrap:wrap}
    button{flex:1;min-width:80px;padding:11px 8px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
    button:active{opacity:.7}
    .btn-green{background:#2d6a4f;color:#fff}
    .btn-orange{background:#e76f51;color:#fff}
    .btn-teal{background:#40916c;color:#fff}
    .btn-red{background:#d90429;color:#fff}
    .btn-gray{background:#e9ecef;color:#333}
    .btn-small{flex:none;min-width:auto;padding:5px 10px;font-size:12px;border-radius:7px}
    .leaf-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#f0faf4;border-radius:8px;margin-bottom:5px;font-size:14px}
    .leaf-item .area{font-weight:700;color:#2d6a4f}
    .leaf-item .del{color:#d00;font-weight:700;cursor:pointer;padding:2px 8px}
    .current-total{text-align:center;padding:9px;background:#d8f3dc;border-radius:9px;margin:8px 0;font-size:14px}
    .current-total strong{font-size:20px;color:#1b4332}
    .summary{display:flex;justify-content:space-around;text-align:center}
    .summary .num{font-size:18px;font-weight:700;color:#2d6a4f}
    .summary .lab{font-size:11px;color:#666;margin-top:2px}
    .record{border:1px solid #e8ecf0;border-radius:10px;padding:10px;margin-bottom:7px;background:#fafcff}
    .record-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .record-head .idx{font-weight:700;font-size:14px}
    .record-head .badge{background:#b7e4c7;color:#1b4332;padding:2px 10px;border-radius:11px;font-size:12px;font-weight:600}
    .record-head .rep-badge{background:#ffe5d0;color:#9c4221;padding:2px 10px;border-radius:11px;font-size:12px;font-weight:600;margin-left:4px}
    .record-body{font-size:13px;color:#555;line-height:1.7}
    .record-body .total-line{font-size:14px;color:#2d6a4f;font-weight:700;margin-top:3px}
    .record-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
    .record-foot .time{font-size:11px;color:#999}
    .record-foot .btns{display:flex;gap:5px}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
    .filter-btn{padding:4px 12px;border-radius:18px;font-size:12px;border:1.5px solid #b7e4c7;background:#fff;color:#2d6a4f;cursor:pointer;font-weight:600;flex:none;min-width:auto}
    .filter-btn.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
    .hint{font-size:11px;color:#999;text-align:center;margin-top:5px}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1b4332;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:.95}
    .modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center}
    .modal-mask.show{display:flex}
    .modal{background:#fff;border-radius:14px;padding:18px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto}
    .modal h3{margin-bottom:12px}
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🌽 长武玉米叶面积测定</h1>
  </div>

  <!-- 输入区 -->
  <div class="card">
    <!-- 处理 + 重复 同一行 -->
    <div class="tr-row">
      <label>处理</label>
      <input type="text" id="treatment" class="treat-input" placeholder="如 CK、N1" />
      <span class="rep-label">重复</span>
      <input type="text" id="repeat" class="rep-input" placeholder="" inputmode="numeric" />
    </div>
    <!-- 重复快捷按钮 -->
    <div class="rep-btns">
      <button class="rep-btn" onclick="setRep(1)">1</button>
      <button class="rep-btn" onclick="setRep(2)">2</button>
      <button class="rep-btn" onclick="setRep(3)">3</button>
    </div>

    <div class="form-row">
      <label>系数</label>
      <input type="number" id="inputK" value="0.75" step="0.01" />
    </div>
    <div style="height:1px;background:#eee;margin:6px 0"></div>
    <div class="form-row">
      <label>叶长</label>
      <input type="number" id="inputL" placeholder="cm" step="0.01" inputmode="decimal"
        onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('inputW').focus()}" />
    </div>
    <div class="form-row">
      <label>叶宽</label>
      <input type="number" id="inputW" placeholder="cm" step="0.01" inputmode="decimal"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addLeaf()}" />
    </div>
    <div class="btn-row">
      <button class="btn-green" onclick="addLeaf()">➕ 添加此叶</button>
    </div>
    <div class="hint">叶长回车→跳叶宽→回车→自动添加</div>
  </div>

  <!-- 当前株 -->
  <div class="card">
    <h3>🌿 当前株 <span id="leafCount" style="color:#e76f51">(0片)</span></h3>
    <div id="leafList"></div>
    <div class="hint" id="leafEmpty">还没录入叶片</div>
    <div class="current-total" id="currentTotal" style="display:none">
      本株总叶面积：<strong id="currentSum">0.00</strong> cm²
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn-orange" onclick="finishPlant()">✅ 完成本株</button>
      <button class="btn-gray" onclick="clearLeaves()">🔄 清空</button>
    </div>
  </div>

  <!-- 汇总 -->
  <div class="card">
    <h3>📊 汇总</h3>
    <div class="filter-row" id="filterRow"></div>
    <div class="summary">
      <div><div class="num" id="sPlants">0</div><div class="lab">株数</div></div>
      <div><div class="num" id="sTotal">0.00</div><div class="lab">总面积 cm²</div></div>
      <div><div class="num" id="sAvg">0.00</div><div class="lab">株均 cm²</div></div>
    </div>
  </div>

  <!-- 操作 -->
  <div class="card">
    <div class="btn-row">
      <button class="btn-teal" onclick="exportCSV()">📥 导出CSV</button>
      <button class="btn-red" onclick="clearAll()">🗑 清空全部</button>
    </div>
  </div>

  <!-- 历史 -->
  <div class="card">
    <h3>📋 历史记录</h3>
    <div id="recordList"></div>
    <div class="hint" id="recordEmpty">暂无记录</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 编辑弹窗 -->
<div class="modal-mask" id="editModal">
  <div class="modal">
    <h3>✏️ 编辑本株</h3>
    <div class="tr-row">
      <label>处理</label>
      <input type="text" id="editTreat" class="treat-input" />
      <span class="rep-label">重复</span>
      <input type="text" id="editRep" class="rep-input" />
    </div>
    <div id="editLeafList"></div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn-green" onclick="saveEdit()">保存</button>
      <button class="btn-gray" onclick="closeEdit()">取消</button>
    </div>
  </div>
</div>

<script>
  let records = JSON.parse(localStorage.getItem('mz4_records')) || [];
  let currentLeaves = [];
  let filterTreat = '全部';
  let editId = -1;

  // 系数记住上次的
  document.getElementById('inputK').value = localStorage.getItem('mz4_lastK') || '0.75';

  function save() {
    localStorage.setItem('mz4_records', JSON.stringify(records));
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1500);
  }

  // 选择重复
  function setRep(n) {
    document.getElementById('repeat').value = n;
    updateRepBtns();
  }

  function updateRepBtns() {
    const val = document.getElementById('repeat').value;
    document.querySelectorAll('.rep-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === val);
    });
  }

  // 重复输入框变化时也更新按钮高亮
  document.getElementById('repeat').addEventListener('input', updateRepBtns);

  // ===== 添加叶片 =====
  function addLeaf() {
    const L = parseFloat(document.getElementById('inputL').value);
    const W = parseFloat(document.getElementById('inputW').value);
    const K = parseFloat(document.getElementById('inputK').value);
    if (isNaN(L) || isNaN(W) || isNaN(K) || L <= 0 || W <= 0) {
      toast('请输入有效的叶长叶宽'); return;
    }
    currentLeaves.push({ l: L, w: W, area: L * W * K });
    document.getElementById('inputL').value = '';
    document.getElementById('inputW').value = '';
    document.getElementById('inputL').focus();
    renderCurrentLeaves();
  }

  function removeLeaf(i) {
    currentLeaves.splice(i, 1);
    renderCurrentLeaves();
  }

  function renderCurrentLeaves() {
    const list = document.getElementById('leafList');
    const hint = document.getElementById('leafEmpty');
    const totalDiv = document.getElementById('currentTotal');
    document.getElementById('leafCount').textContent = `(${currentLeaves.length}片)`;
    if (currentLeaves.length === 0) {
      list.innerHTML = ''; hint.style.display = 'block'; totalDiv.style.display = 'none'; return;
    }
    hint.style.display = 'none'; totalDiv.style.display = 'block';
    let sum = 0;
    list.innerHTML = currentLeaves.map((lf, i) => {
      sum += lf.area;
      return `<div class="leaf-item">
        <span>叶${i+1}：${lf.l} × ${lf.w}</span>
        <span class="area">${lf.area.toFixed(2)}</span>
        <span class="del" onclick="removeLeaf(${i})">✕</span>
      </div>`;
    }).join('');
    document.getElementById('currentSum').textContent = sum.toFixed(2);
  }

  function clearLeaves() {
    if (currentLeaves.length === 0) return;
    currentLeaves = [];
    renderCurrentLeaves();
    toast('已清空当前株');
  }

  // ===== 完成本株 =====
  function finishPlant() {
    if (currentLeaves.length === 0) {
      toast('还没录入叶片'); return;
    }
    const treat = document.getElementById('treatment').value.trim() || '未命名';
    const rep = document.getElementById('repeat').value.trim() || '';
    const coef = parseFloat(document.getElementById('inputK').value);
    let totalArea = 0;
    currentLeaves.forEach(l => totalArea += l.area);

    records.push({
      id: Date.now(),
      treat, rep, coef,
      leaves: JSON.parse(JSON.stringify(currentLeaves)),
      totalArea,
      leafCount: currentLeaves.length,
      time: new Date().toISOString()
    });

    localStorage.setItem('mz4_lastK', coef);

    save();
    toast(`✅ 已保存 ${treat}${rep?'-重复'+rep:''}：${totalArea.toFixed(2)} cm²`);

    // 清空：叶片、处理、重复
    currentLeaves = [];
    document.getElementById('treatment').value = '';
    document.getElementById('repeat').value = '';
    updateRepBtns();
    renderCurrentLeaves();
    renderRecords();
    document.getElementById('treatment').focus();
  }

  // ===== 筛选 =====
  function renderFilter() {
    const treats = [...new Set(records.map(r => r.treat))];
    const row = document.getElementById('filterRow');
    let html = `<span class="filter-btn ${filterTreat==='全部'?'active':''}" onclick="setFilter('全部')">全部</span>`;
    treats.forEach(t => {
      html += `<span class="filter-btn ${filterTreat===t?'active':''}" onclick="setFilter('${t}')">${t}</span>`;
    });
    row.innerHTML = html;
  }

  function setFilter(t) {
    filterTreat = t;
    renderFilter();
    renderRecords();
  }

  // ===== 历史 =====
  function fmtTime(d) {
    const o = new Date(d);
    return `${o.getMonth()+1}/${o.getDate()} ${String(o.getHours()).padStart(2,'0')}:${String(o.getMinutes()).padStart(2,'0')}`;
  }

  function renderRecords() {
    const list = document.getElementById('recordList');
    const hint = document.getElementById('recordEmpty');
    const filtered = filterTreat === '全部' ? records : records.filter(r => r.treat === filterTreat);

    if (filtered.length === 0) {
      list.innerHTML = ''; hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
      list.innerHTML = filtered.slice().reverse().map(p => {
        const realIdx = records.indexOf(p) + 1;
        const leafDetail = p.leaves.map((lf, i) =>
          `叶${i+1}：${lf.l}×${lf.w}=${lf.area.toFixed(2)}`
        ).join('<br>');
        return `<div class="record">
          <div class="record-head">
            <span class="idx">株 #${realIdx}</span>
            <div>
              <span class="badge">${p.treat}</span>
              ${p.rep ? `<span class="rep-badge">重复 ${p.rep}</span>` : ''}
            </div>
          </div>
          <div class="record-body">
            ${leafDetail}
            <div class="total-line">共 ${p.leafCount} 片 ｜ ${p.totalArea.toFixed(2)} cm²</div>
          </div>
          <div class="record-foot">
            <span class="time">${fmtTime(p.time)}</span>
            <div class="btns">
              <button class="btn-teal btn-small" onclick="openEdit(${p.id})">编辑</button>
              <button class="btn-red btn-small" onclick="delRecord(${p.id})">删除</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    let total = 0;
    filtered.forEach(r => total += r.totalArea);
    document.getElementById('sPlants').textContent = filtered.length;
    document.getElementById('sTotal').textContent = total.toFixed(2);
    document.getElementById('sAvg').textContent = filtered.length ? (total / filtered.length).toFixed(2) : '0.00';

    renderFilter();
  }

  function delRecord(id) {
    if (!confirm('删除这株记录？')) return;
    records = records.filter(r => r.id !== id);
    save();
    renderRecords();
  }

  // ===== 编辑 =====
  function openEdit(id) {
    editId = id;
    const p = records.find(r => r.id === id);
    if (!p) return;
    document.getElementById('editTreat').value = p.treat;
    document.getElementById('editRep').value = p.rep || '';
    document.getElementById('editLeafList').innerHTML = p.leaves.map((lf, i) => `
      <div class="form-row">
        <label>叶${i+1}</label>
        <input type="number" class="edit-l" value="${lf.l}" step="0.01" style="max-width:35%" />
        <span style="color:#999">×</span>
        <input type="number" class="edit-w" value="${lf.w}" step="0.01" style="max-width:35%" />
      </div>
    `).join('');
    document.getElementById('editModal').classList.add('show');
  }

  function closeEdit() {
    document.getElementById('editModal').classList.remove('show');
    editId = -1;
  }

  function saveEdit() {
    const p = records.find(r => r.id === editId);
    if (!p) return;
    const treat = document.getElementById('editTreat').value.trim() || '未命名';
    const rep = document.getElementById('editRep').value.trim() || '';
    const ls = document.querySelectorAll('.edit-l');
    const ws = document.querySelectorAll('.edit-w');
    const leaves = [];
    let totalArea = 0;
    for (let i = 0; i < ls.length; i++) {
      const l = parseFloat(ls[i].value);
      const w = parseFloat(ws[i].value);
      if (isNaN(l) || isNaN(w)) { toast(`叶${i+1} 数据有误`); return; }
      const area = l * w * p.coef;
      leaves.push({ l, w, area });
      totalArea += area;
    }
    p.treat = treat;
    p.rep = rep;
    p.leaves = leaves;
    p.totalArea = totalArea;
    p.leafCount = leaves.length;
    save();
    renderRecords();
    closeEdit();
    toast('已保存修改');
  }

  // ===== 导出 =====
  function exportCSV() {
    const filtered = filterTreat === '全部' ? records : records.filter(r => r.treat === filterTreat);
    if (filtered.length === 0) { toast('无数据'); return; }
    let csv = '\uFEFF株号,处理,重复,叶位,叶长(cm),叶宽(cm),系数,单叶面积(cm²),株总面积(cm²),时间\n';
    filtered.forEach(r => {
      const idx = records.indexOf(r) + 1;
      r.leaves.forEach((lf, i) => {
        csv += `${idx},${r.treat},${r.rep||''},${i+1},${lf.l},${lf.w},${r.coef},${lf.area.toFixed(2)},${i===0 ? r.totalArea.toFixed(2) : ''},${i===0 ? fmtTime(r.time) : ''}\n`;
      });
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `玉米叶面积_${filterTreat}_${new Date().toLocaleDateString()}.csv`;
    a.click();
  }

  function clearAll() {
    if (!confirm('确定清空全部历史？不可恢复！')) return;
    records = [];
    save();
    renderRecords();
    toast('已清空全部');
  }

  renderCurrentLeaves();
  renderRecords();
</script>
</body>
</html>

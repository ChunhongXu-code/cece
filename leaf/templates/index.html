<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>玉米叶面积测定</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f4f0;color:#222;padding-bottom:60px}
    .container{max-width:460px;margin:0 auto;padding:12px}
    .header{background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;text-align:center;padding:16px 12px;border-radius:14px;margin-bottom:12px}
    .header h1{font-size:20px;margin-bottom:4px}
    .header p{font-size:12px;opacity:.85}
    .card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .card h3{font-size:15px;color:#2d6a4f;margin-bottom:10px;border-left:3px solid #2d6a4f;padding-left:8px}
    .form-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
    .form-row label{font-size:14px;font-weight:600;white-space:nowrap;min-width:56px}
    .form-row input,.form-row select{flex:1;padding:11px 12px;border:1.5px solid #d0d7de;border-radius:10px;font-size:16px;outline:none;background:#fafcff}
    .form-row input:focus,.form-row select:focus{border-color:#2d6a4f;background:#fff}
    .treat-row{display:flex;gap:6px;margin-bottom:10px}
    .treat-row input{flex:1;padding:9px 10px;border:1.5px solid #d0d7de;border-radius:10px;font-size:14px;outline:none}
    .treat-tag{display:inline-block;background:#d8f3dc;color:#1b4332;padding:4px 10px;border-radius:20px;font-size:13px;margin:2px 4px 2px 0}
    .treat-tag .x{color:#d00;margin-left:4px;font-weight:700;cursor:pointer}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}
    button{flex:1;min-width:80px;padding:11px 8px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
    button:active{opacity:.7}
    .btn-green{background:#2d6a4f;color:#fff}
    .btn-orange{background:#e76f51;color:#fff}
    .btn-teal{background:#40916c;color:#fff}
    .btn-red{background:#d90429;color:#fff}
    .btn-gray{background:#e9ecef;color:#333}
    .btn-small{flex:none;min-width:auto;padding:6px 12px;font-size:13px;border-radius:8px}
    .leaf-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f0faf4;border-radius:8px;margin-bottom:6px;font-size:14px}
    .leaf-item .area{font-weight:700;color:#2d6a4f}
    .leaf-item .del{color:#d00;font-weight:700;cursor:pointer;padding:2px 8px}
    .current-total{text-align:center;padding:10px;background:#d8f3dc;border-radius:10px;margin:10px 0;font-size:15px}
    .current-total strong{font-size:22px;color:#1b4332}
    .summary{display:flex;justify-content:space-around;text-align:center}
    .summary .num{font-size:20px;font-weight:700;color:#2d6a4f}
    .summary .lab{font-size:12px;color:#666;margin-top:2px}
    .record{border:1px solid #e8ecf0;border-radius:12px;padding:12px;margin-bottom:8px;background:#fafcff}
    .record-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .record-head .idx{font-weight:700;font-size:14px}
    .record-head .badge{background:#b7e4c7;color:#1b4332;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
    .record-body{font-size:13px;color:#555;line-height:1.8}
    .record-body .total-line{font-size:15px;color:#2d6a4f;font-weight:700;margin-top:4px}
    .record-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .record-foot .time{font-size:11px;color:#999}
    .record-foot .btns{display:flex;gap:6px}
    .record-foot .operator-tag{font-size:11px;color:#40916c;background:#d8f3dc;padding:2px 8px;border-radius:10px}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .filter-btn{padding:5px 14px;border-radius:20px;font-size:13px;border:1.5px solid #b7e4c7;background:#fff;color:#2d6a4f;cursor:pointer;font-weight:600}
    .filter-btn.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
    .hint{font-size:12px;color:#999;text-align:center;margin-top:6px}
    .modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center}
    .modal-mask.show{display:flex}
    .modal{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
    .modal h3{margin-bottom:14px}
    .loading{text-align:center;color:#999;padding:20px;font-size:14px}
    .status-bar{background:#1b4332;color:#b7e4c7;text-align:center;padding:6px;font-size:12px;border-radius:8px;margin-bottom:10px}
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🌽 玉米叶面积测定</h1>
    <p>多人共享 ｜ 数据存服务器 ｜ 不怕丢失</p>
  </div>

  <div class="status-bar" id="statusBar">数据存储在服务器，所有人共享</div>

  <!-- 记录人 -->
  <div class="card">
    <h3>👤 记录人</h3>
    <div class="form-row">
      <label>姓名</label>
      <input type="text" id="operator" placeholder="输入你的名字" />
    </div>
    <div class="hint">用于区分是谁录入的数据</div>
  </div>

  <!-- 处理组 -->
  <div class="card">
    <h3>处理组管理</h3>
    <div id="treatTags"></div>
    <div class="treat-row">
      <input type="text" id="newTreat" placeholder="如 CK、N1"
        onkeydown="if(event.key==='Enter') addTreat()" />
      <button class="btn-teal btn-small" onclick="addTreat()">添加</button>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="card">
    <h3>📝 当前录入</h3>
    <div class="form-row">
      <label>处理</label>
      <select id="treatment"></select>
    </div>
    <div class="form-row">
      <label>系数 k</label>
      <input type="number" id="inputK" value="0.75" step="0.01" />
    </div>
    <div style="height:1px;background:#eee;margin:8px 0"></div>
    <div class="form-row">
      <label>叶长</label>
      <input type="number" id="inputL" placeholder="cm" step="0.01" inputmode="decimal"
        onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('inputW').focus()}" />
    </div>
    <div class="form-row">
      <label>叶宽</label>
      <input type="number" id="inputW" placeholder="cm" step="0.01" inputmode="decimal"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addLeaf()}" />
    </div>
    <div class="btn-row">
      <button class="btn-green" onclick="addLeaf()">➕ 添加此叶</button>
    </div>
    <div class="hint">叶长回车→跳叶宽→回车→自动添加</div>
  </div>

  <!-- 当前株 -->
  <div class="card">
    <h3>🌿 当前株叶片 <span id="leafCount" style="color:#e76f51">(0片)</span></h3>
    <div id="leafList"></div>
    <div class="hint" id="leafEmpty">还没录入叶片</div>
    <div class="current-total" id="currentTotal" style="display:none">
      本株总叶面积：<strong id="currentSum">0.00</strong> cm²
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn-orange" onclick="finishPlant()">✅ 完成本株并保存</button>
      <button class="btn-gray" onclick="clearLeaves()">🔄 清空重来</button>
    </div>
  </div>

  <!-- 汇总 -->
  <div class="card">
    <h3>📊 汇总统计</h3>
    <div class="filter-row" id="filterRow"></div>
    <div class="summary">
      <div><div class="num" id="sPlants">0</div><div class="lab">株数</div></div>
      <div><div class="num" id="sTotal">0.00</div><div class="lab">总面积 cm²</div></div>
      <div><div class="num" id="sAvg">0.00</div><div class="lab">株均 cm²</div></div>
    </div>
  </div>

  <!-- 导出 -->
  <div class="card">
    <div class="btn-row">
      <button class="btn-teal" onclick="exportCSV()">📥 导出CSV</button>
      <button class="btn-teal" onclick="backupDB()">💾 备份数据库</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn-gray" onclick="loadPlants()">🔄 刷新数据</button>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <h3>📋 历史记录</h3>
    <div id="recordList"></div>
    <div class="hint" id="recordEmpty">暂无记录</div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-mask" id="editModal">
  <div class="modal">
    <h3>✏️ 编辑本株数据</h3>
    <div class="form-row">
      <label>处理</label>
      <select id="editTreat"></select>
    </div>
    <div id="editLeafList"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn-green" onclick="saveEdit()">保存</button>
      <button class="btn-gray" onclick="closeEdit()">取消</button>
    </div>
  </div>
</div>

<script>
  const API = '';  // 同源，不需要前缀
  let currentLeaves = [];
  let filterTreat = '全部';
  let allPlants = [];
  let treats = [];
  let editId = -1;

  // ===== 通用请求 =====
  async function api(url, method = 'GET', body = null) {
    const opt = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opt.body = JSON.stringify(body);
    const res = await fetch(API + url, opt);
    return res.json();
  }

  // ===== 记录人 - 本地缓存 =====
  const opInput = document.getElementById('operator');
  opInput.value = localStorage.getItem('leaf_operator') || '';
  opInput.addEventListener('input', () => {
    localStorage.setItem('leaf_operator', opInput.value);
  });

  // ===== 处理组 =====
  async function loadTreats() {
    treats = await api('/api/treatments');
    renderTreats();
  }

  function renderTreats() {
    document.getElementById('treatTags').innerHTML = treats.map(t =>
      `<span class="treat-tag">${t}<span class="x" onclick="removeTreat('${t}')">×</span></span>`
    ).join('');
    const opts = treats.map(t => `<option value="${t}">${t}</option>`).join('');
    document.getElementById('treatment').innerHTML = opts;
    document.getElementById('editTreat').innerHTML = opts;
    renderFilter();
  }

  async function addTreat() {
    const inp = document.getElementById('newTreat');
    const v = inp.value.trim();
    if (!v) return;
    const res = await api('/api/treatments', 'POST', { name: v });
    if (res.error) { alert(res.error); return; }
    inp.value = '';
    await loadTreats();
  }

  async function removeTreat(name) {
    if (!confirm(`删除处理 "${name}"？`)) return;
    await api(`/api/treatments/${name}`, 'DELETE');
    await loadTreats();
  }

  // ===== 筛选 =====
  function renderFilter() {
    const row = document.getElementById('filterRow');
    let html = `<span class="filter-btn ${filterTreat==='全部'?'active':''}" onclick="setFilter('全部')">全部</span>`;
    treats.forEach(t => {
      html += `<span class="filter-btn ${filterTreat===t?'active':''}" onclick="setFilter('${t}')">${t}</span>`;
    });
    row.innerHTML = html;
  }

  function setFilter(t) {
    filterTreat = t;
    renderFilter();
    loadPlants();
  }

  // ===== 当前叶片 =====
  function addLeaf() {
    const L = parseFloat(document.getElementById('inputL').value);
    const W = parseFloat(document.getElementById('inputW').value);
    const K = parseFloat(document.getElementById('inputK').value);
    if (isNaN(L) || isNaN(W) || isNaN(K) || L <= 0 || W <= 0) {
      alert('请输入有效的叶长和叶宽'); return;
    }
    currentLeaves.push({ l: L, w: W, area: L * W * K });
    document.getElementById('inputL').value = '';
    document.getElementById('inputW').value = '';
    document.getElementById('inputL').focus();
    renderCurrentLeaves();
  }

  function removeLeaf(i) {
    currentLeaves.splice(i, 1);
    renderCurrentLeaves();
  }

  function renderCurrentLeaves() {
    const list = document.getElementById('leafList');
    const hint = document.getElementById('leafEmpty');
    const totalDiv = document.getElementById('currentTotal');
    document.getElementById('leafCount').textContent = `(${currentLeaves.length}片)`;
    if (currentLeaves.length === 0) {
      list.innerHTML = ''; hint.style.display = 'block'; totalDiv.style.display = 'none'; return;
    }
    hint.style.display = 'none'; totalDiv.style.display = 'block';
    let sum = 0;
    list.innerHTML = currentLeaves.map((lf, i) => {
      sum += lf.area;
      return `<div class="leaf-item">
        <span>叶${i+1}：${lf.l} × ${lf.w}</span>
        <span class="area">${lf.area.toFixed(2)}</span>
        <span class="del" onclick="removeLeaf(${i})">✕</span>
      </div>`;
    }).join('');
    document.getElementById('currentSum').textContent = sum.toFixed(2);
  }

  function clearLeaves() {
    if (currentLeaves.length > 0 && !confirm('清空当前株？')) return;
    currentLeaves = [];
    renderCurrentLeaves();
  }

  // ===== 完成本株 =====
  async function finishPlant() {
    if (currentLeaves.length === 0) { alert('还没录入叶片'); return; }
    const treat = document.getElementById('treatment').value;
    const coef = parseFloat(document.getElementById('inputK').value);
    const operator = document.getElementById('operator').value.trim();

    const res = await api('/api/plants', 'POST', {
      treatment: treat,
      coef: coef,
      leaves: currentLeaves,
      operator: operator
    });

    if (res.error) { alert(res.error); return; }

    alert(`✅ 已保存到服务器！\n处理：${treat}\n叶片数：${currentLeaves.length}\n总面积：${res.total_area.toFixed(2)} cm²`);
    currentLeaves = [];
    renderCurrentLeaves();
    await loadPlants();
  }

  // ===== 加载历史 =====
  async function loadPlants() {
    const url = filterTreat === '全部' ? '/api/plants' : `/api/plants?treatment=${filterTreat}`;
    allPlants = await api(url);
    renderRecords();
  }

  function fmtTime(d) {
    if (!d) return '';
    const o = new Date(d + (d.includes('T') ? '' : ' UTC'));
    return `${o.getMonth()+1}/${o.getDate()} ${String(o.getHours()).padStart(2,'0')}:${String(o.getMinutes()).padStart(2,'0')}`;
  }

  function renderRecords() {
    const list = document.getElementById('recordList');
    const hint = document.getElementById('recordEmpty');

    if (allPlants.length === 0) {
      list.innerHTML = ''; hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
      list.innerHTML = allPlants.map(p => {
        const leafDetail = p.leaves.map((lf, i) =>
          `叶${i+1}：${lf.l}×${lf.w}=${lf.area.toFixed(2)}`
        ).join('<br>');
        return `<div class="record">
          <div class="record-head">
            <span class="idx">株 #${p.id}</span>
            <span class="badge">${p.treatment}</span>
          </div>
          <div class="record-body">
            ${leafDetail}
            <div class="total-line">共 ${p.leaf_count} 片叶 ｜ 总面积：${p.total_area.toFixed(2)} cm²</div>
          </div>
          <div class="record-foot">
            <div>
              <span class="time">${fmtTime(p.created_at)}</span>
              ${p.operator ? `<span class="operator-tag">${p.operator}</span>` : ''}
            </div>
            <div class="btns">
              <button class="btn-teal btn-small" onclick="openEdit(${p.id})">编辑</button>
              <button class="btn-red btn-small" onclick="delRecord(${p.id})">删除</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    let total = 0;
    allPlants.forEach(p => total += p.total_area);
    document.getElementById('sPlants').textContent = allPlants.length;
    document.getElementById('sTotal').textContent = total.toFixed(2);
    document.getElementById('sAvg').textContent = allPlants.length ? (total / allPlants.length).toFixed(2) : '0.00';
  }

  async function delRecord(id) {
    if (!confirm('删除这株记录？')) return;
    await api(`/api/plants/${id}`, 'DELETE');
    await loadPlants();
  }

  // ===== 编辑 =====
  function openEdit(id) {
    editId = id;
    const p = allPlants.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editTreat').value = p.treatment;
    document.getElementById('editLeafList').innerHTML = p.leaves.map((lf, i) => `
      <div class="form-row">
        <label>叶${i+1}</label>
        <input type="number" class="edit-l" value="${lf.l}" step="0.01" style="max-width:35%" />
        <span style="color:#999">×</span>
        <input type="number" class="edit-w" value="${lf.w}" step="0.01" style="max-width:35%" />
      </div>
    `).join('');
    document.getElementById('editModal').classList.add('show');
  }

  function closeEdit() {
    document.getElementById('editModal').classList.remove('show');
    editId = -1;
  }

  async function saveEdit() {
    const p = allPlants.find(x => x.id === editId);
    const treat = document.getElementById('editTreat').value;
    const ls = document.querySelectorAll('.edit-l');
    const ws = document.querySelectorAll('.edit-w');
    const leaves = [];
    for (let i = 0; i < ls.length; i++) {
      const l = parseFloat(ls[i].value);
      const w = parseFloat(ws[i].value);
      if (isNaN(l) || isNaN(w)) { alert(`叶${i+1} 数据有误`); return; }
      leaves.push({ l, w });
    }
    await api(`/api/plants/${editId}`, 'PUT', {
      treatment: treat, coef: p.coef, leaves
    });
    closeEdit();
    await loadPlants();
  }

  // ===== 导出 =====
  function exportCSV() {
    const url = filterTreat === '全部' ? '/api/export' : `/api/export?treatment=${filterTreat}`;
    window.open(url);
  }

  function backupDB() {
    window.open('/api/backup');
  }

  // ===== 初始化 =====
  (async () => {
    await loadTreats();
    await loadPlants();
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 性格类型测试 - JoyCece</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.96);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #a29bfe, #6c5ce7, #fd79a8, #e17055, #fdcb6e, #00cec9);
        }

        .start-page { text-align: center; padding: 40px 0; }

        .start-page h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .start-page .subtitle {
            color: #666;
            font-size: 1.05em;
            margin-bottom: 10px;
            line-height: 1.8;
        }

        .start-page .desc {
            color: #999;
            font-size: 0.88em;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .start-page .emoji-row {
            font-size: 2.5em;
            margin-bottom: 28px;
            letter-spacing: 6px;
        }

        .dimension-intro {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 32px;
            text-align: left;
        }

        .dim-card {
            background: #f8f7ff;
            border-radius: 12px;
            padding: 14px;
        }

        .dim-card-title {
            font-size: 0.85em;
            font-weight: bold;
            color: #6c5ce7;
            margin-bottom: 4px;
        }

        .dim-card-desc {
            font-size: 0.75em;
            color: #999;
            line-height: 1.4;
        }

        .start-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(108,92,231,0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(108,92,231,0.5);
        }

        .progress-container { margin-bottom: 28px; }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.88em;
            color: #888;
        }

        .progress-bar {
            height: 8px;
            background: #f0eeff;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .dim-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dim-dot {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 500;
            background: #f0eeff;
            color: #a29bfe;
            transition: all 0.3s;
        }

        .dim-dot.active {
            background: #6c5ce7;
            color: white;
        }

        .dim-dot.done {
            background: #00b894;
            color: white;
        }

        .question-page { display: none; }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            width: 36px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 24px;
            line-height: 1.7;
            font-weight: 500;
            text-align: center;
        }

        .question-hint {
            text-align: center;
            color: #bbb;
            font-size: 0.82em;
            margin-bottom: 20px;
        }

        .options-binary {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .option-binary {
            padding: 18px 22px;
            border: 2px solid #f0eeff;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            color: #555;
            line-height: 1.6;
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .option-binary:hover {
            border-color: #a29bfe;
            background: rgba(162,155,254,0.05);
            transform: translateX(5px);
        }

        .option-binary.selected {
            border-color: #6c5ce7;
            background: linear-gradient(135deg, rgba(108,92,231,0.08), rgba(162,155,254,0.08));
            color: #333;
            font-weight: 500;
        }

        .option-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 2px;
        }

        .option-binary:first-child .option-letter {
            background: #f0eeff;
            color: #6c5ce7;
        }

        .option-binary:last-child .option-letter {
            background: #e8faf3;
            color: #00b894;
        }

        .option-binary.selected .option-letter {
            background: #6c5ce7;
            color: white;
        }

        .option-text { flex: 1; }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-prev { background: #f0eeff; color: #6c5ce7; }
        .btn-prev:hover { background: #e0deff; }

        .btn-next {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,92,231,0.4);
        }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        .auto-next-hint {
            text-align: center;
            color: #a29bfe;
            font-size: 0.85em;
            margin-top: -18px;
            margin-bottom: 18px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .auto-next-hint.show { opacity: 1; }

        /* 加载 */
        .loading-page { display: none; text-align: center; padding: 60px 0; }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid #f0eeff;
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: #888; font-size: 1.1em; }

        /* 付费墙 */
        .paywall-page { display: none; text-align: center; padding: 20px 0; }

        .paywall-page h2 {
            font-size: 1.6em;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .paywall-preview {
            background: linear-gradient(135deg, #f8f7ff, #eee8ff);
            border-radius: 18px;
            padding: 24px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .paywall-preview::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(transparent, rgba(255,255,255,0.95));
        }

        .type-preview {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .type-letter-preview {
            width: 44px; height: 44px;
            line-height: 44px;
            text-align: center;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
        }

        .paywall-lock { font-size: 3em; margin: 20px 0 10px; }

        .paywall-price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
        }

        .price-original { color: #ccc; text-decoration: line-through; font-size: 1.1em; }
        .price-current { color: #e17055; font-size: 2em; font-weight: bold; }
        .price-tag { background: #e17055; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.75em; }

        .paywall-features {
            text-align: left;
            background: #f8f7ff;
            border-radius: 14px;
            padding: 20px;
            margin: 20px 0;
        }

        .paywall-features .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            color: #555;
            font-size: 0.95em;
        }

        .paywall-features .feature-item::before { content: '✅'; }

        .pay-btn {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
            margin: 20px 0;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,92,231,0.4);
        }

        .countdown-bar {
            margin: 16px 0;
            padding: 12px 16px;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 12px;
            color: #e17055;
            font-size: 0.95em;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .countdown-num { font-size: 1.3em; font-weight: bold; color: #d63031; min-width: 80px; }

        .paywall-guarantee {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .guarantee-item { color: #999; font-size: 0.8em; display: flex; align-items: center; gap: 4px; }

        .paywall-note { color: #bbb; font-size: 0.8em; margin-top: 16px; line-height: 1.6; }

        /* 弹窗 */
        .qrcode-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .qrcode-modal.show { display: flex; }

        .qrcode-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            max-width: 380px;
            width: 92%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .qrcode-content h3 { margin-bottom: 16px; color: #333; }
        .qrcode-content p { color: #888; font-size: 0.9em; margin-bottom: 12px; line-height: 1.6; }

        .qrcode-placeholder {
            width: 220px; height: 220px;
            background: #f8f7ff;
            border: 3px dashed #a29bfe;
            border-radius: 12px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 12px; right: 16px;
            background: none; border: none;
            font-size: 1.5em; cursor: pointer; color: #999;
        }

        .modal-price { color: #e17055; font-size: 1.4em; font-weight: bold; margin: 4px 0; }

        .verify-steps {
            background: #f8f7ff;
            border: 1px solid #eee8ff;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            text-align: left;
        }

        .verify-steps .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 0;
            font-size: 0.85em;
            color: #555;
            line-height: 1.5;
        }

        .verify-steps .step-num {
            background: #6c5ce7;
            color: white;
            min-width: 20px; height: 20px;
            line-height: 20px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 2px;
        }

        .verify-input-group { margin: 16px 0; }

        .verify-input-group label {
            display: block;
            color: #555;
            font-size: 0.85em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .verify-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f0eeff;
            border-radius: 12px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .verify-input:focus { border-color: #6c5ce7; }

        .verify-input-hint { color: #bbb; font-size: 0.75em; margin-top: 4px; }

        .confirm-paid-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1.05em;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
            width: 100%;
        }

        .confirm-paid-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .confirm-paid-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .verify-error { color: #e17055; font-size: 0.85em; margin-top: 8px; display: none; }

        .verify-waiting { color: #6c5ce7; font-size: 0.95em; padding: 20px; text-align: center; }

        .verify-waiting .wait-spinner {
            width: 30px; height: 30px;
            border: 3px solid #f0eeff;
            border-top: 3px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        /* 结果页 */
        .result-page { display: none; text-align: center; }

        .result-type-letters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .type-letter {
            width: 60px; height: 60px;
            line-height: 60px;
            text-align: center;
            border-radius: 14px;
            font-size: 1.8em;
            font-weight: bold;
            color: white;
        }

        .result-type-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 6px;
        }

        .result-type-title {
            font-size: 1.1em;
            color: #6c5ce7;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .result-type-percent {
            color: #a29bfe;
            font-size: 0.9em;
            margin-bottom: 24px;
        }

        .result-card {
            background: linear-gradient(135deg, #f8f7ff, #eee8ff);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 24px;
            text-align: left;
        }

        .result-card h3 {
            color: #2d3436;
            margin-bottom: 14px;
            font-size: 1.15em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card p {
            color: #444;
            line-height: 2;
            font-size: 1em;
            letter-spacing: 0.3px;
        }

        .dimension-bars { margin-top: 20px; }
        .dimension-item { margin-bottom: 18px; }

        .dim-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.85em;
        }

        .dim-label-left { color: #6c5ce7; font-weight: 500; }
        .dim-label-right { color: #00b894; font-weight: 500; }
        .dim-label-left.active { font-weight: bold; font-size: 0.95em; }
        .dim-label-right.active { font-weight: bold; font-size: 0.95em; }

        .dim-bar-bg {
            height: 14px;
            background: #e8faf3;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .dim-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 10px;
            transition: width 1.5s ease;
        }

        .dim-percent {
            text-align: center;
            font-size: 0.8em;
            color: #999;
            margin-top: 4px;
        }

        .traits-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .trait-item {
            background: rgba(108,92,231,0.08);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9em;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .compatible-types {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .compatible-type {
            background: rgba(108,92,231,0.12);
            color: #6c5ce7;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .result-warm {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 24px;
            text-align: left;
        }

        .result-warm h3 {
            color: #2d3436;
            margin-bottom: 14px;
            font-size: 1.15em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-warm p { color: #555; line-height: 2; font-size: 1em; }

        .restart-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.05em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 28px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(108,92,231,0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
        }

        .home-btn {
            background: none;
            border: 2px solid #a29bfe;
            color: #6c5ce7;
            padding: 12px 32px;
            font-size: 0.95em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
        }

        .home-btn:hover { background: #f8f7ff; }

        .share-hint { margin-top: 16px; color: #aaa; font-size: 0.9em; line-height: 1.6; }

        .fade-in { animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .start-page h1 { font-size: 1.7em; }
            .question-text { font-size: 1.05em; }
            .btn-group { flex-direction: column; }
            .dimension-intro { grid-template-columns: 1fr; }
            .traits-grid { grid-template-columns: 1fr; }
            .type-letter { width: 50px; height: 50px; line-height: 50px; font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="start-page" id="startPage">
            <div class="emoji-row">🧩🧠💡✨</div>
            <h1>MBTI 性格类型测试</h1>
            <p class="subtitle">探索你的性格密码<br>了解真实的自己</p>
            <div class="dimension-intro">
                <div class="dim-card">
                    <div class="dim-card-title">⚡ 精力来源</div>
                    <div class="dim-card-desc">外向(E) vs 内向(I)</div>
                </div>
                <div class="dim-card">
                    <div class="dim-card-title">👁️ 信息获取</div>
                    <div class="dim-card-desc">实感(S) vs 直觉(N)</div>
                </div>
                <div class="dim-card">
                    <div class="dim-card-title">🤔 决策方式</div>
                    <div class="dim-card-desc">思考(T) vs 情感(F)</div>
                </div>
                <div class="dim-card">
                    <div class="dim-card-title">📋 生活态度</div>
                    <div class="dim-card-desc">判断(J) vs 感知(P)</div>
                </div>
            </div>
            <p class="desc">共 48 道题目 · 预计用时 10 分钟<br>每题只有两个选项，选择更符合你的那个 💫</p>
            <button class="start-btn" onclick="startQuiz()">开始测试 →</button>
        </div>

        <div class="question-page" id="questionPage">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">第 1 / 48 题</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="dim-indicator" id="dimIndicator"></div>
            <div id="questionArea" class="fade-in">
                <div class="question-number" id="questionNum">1</div>
                <div class="question-text" id="questionText"></div>
                <div class="question-hint">选择更贴近你的真实感受的选项</div>
                <div class="options-binary" id="optionsArea"></div>
                <div class="auto-next-hint" id="autoNextHint">✨ 已选择，跳转下一题...</div>
            </div>
            <div class="btn-group">

            "ISFP": { name: "探险家", desc: "敏感细腻的艺术家，用行动表达内心的美好", traits: ["审美独特", "温和善良", "活在当下", "灵活自由", "感受力强", "低调真诚"], strengths: "你拥有独特的审美和细腻的感受力，能发现生活中被忽略的美好。你温和、真诚的性格让人感到舒适和放松。你用行动而非语言来表达关爱，这份低调的深情格外动人。", growth: "不要因为害怕冲突而压抑自己的需求，你的声音同样重要。尝试制定一些长远目标，你会发现自己比想象中更有能力。相信自己的判断，你的直觉往往是对的。", compatible: ["ESFJ", "ESTJ"], color1: "#fd79a8", color2: "#fab1a0" },
            "ESTP": { name: "企业家", desc: "精力充沛的行动派，善于把握机遇", traits: ["行动力强", "适应力强", "精力充沛", "善于观察", "务实直接", "活在当下"], strengths: "你是最具行动力的实干家，善于在瞬间抓住机遇。你精力充沛、反应敏捷，能够在不断变化的环境中游刃有余。你务实直接的性格让你在面对挑战时总能快速找到出路。", growth: "在快速行动之前稍作思考，有时候慢下来能看到更好的机会。尝试关注长远规划，你的行动力加上远见会让你更加出色。在追求刺激的同时，也培养一些持久的深度关系。", compatible: ["ISTJ", "ISFJ"], color1: "#e17055", color2: "#fdcb6e" },
            "ESFP": { name: "表演者", desc: "热情活泼的开心果，用快乐感染每一个人", traits: ["热情活泼", "乐于分享", "感染力强", "随性自然", "享受生活", "慷慨大方"], strengths: "你是人群中最耀眼的明星，你的热情和快乐能感染身边每一个人。你天生善于社交，总能让气氛变得轻松愉快。你慷慨大方，乐于与人分享生活中的一切美好。", growth: "在享受当下的同时也为未来留出一些准备。尝试深入发展某项技能或兴趣，你会在专注中发现新的快乐。学会在热闹之后给自己一些安静的时间来思考和沉淀。", compatible: ["ISTJ", "ISFJ"], color1: "#fdcb6e", color2: "#ffeaa7" }
        };

        const dimNames = ["精力来源", "信息获取", "决策方式", "生活态度"];
        const dimCodes = ["EI", "SN", "TF", "JP"];

        let currentQuestion = 0;
        let answers = [];
        let questions = [];
        let autoNextTimer = null;
        let countdownInterval = null;
        let calculatedResult = null;

        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function initQuestions() {
            // 每个维度的题目分别打乱，然后交替排列
            const byDim = { EI: [], SN: [], TF: [], JP: [] };
            questionsRaw.forEach(q => byDim[q.dim].push(q));

            for (let d of dimCodes) { byDim[d] = shuffleArray(byDim[d]); }

            questions = [];
            for (let i = 0; i < 12; i++) {
                for (let d of dimCodes) {
                    if (byDim[d][i]) {
                        const q = byDim[d][i];
                        // 随机交换AB顺序
                        if (Math.random() > 0.5) {
                            questions.push({ dim: q.dim, options: [q.a, q.b], flipped: false });
                        } else {
                            questions.push({ dim: q.dim, options: [q.b, q.a], flipped: true });
                        }
                    }
                }
            }
        }

        function startQuiz() {
            initQuestions();
            answers = new Array(questions.length).fill(undefined);
            currentQuestion = 0;
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('questionPage').style.display = 'block';
            showQuestion(0);
        }

        function getDimIndex(qIndex) {
            return dimCodes.indexOf(questions[qIndex].dim);
        }

        function updateDimIndicator(qIndex) {
            const dimDone = { EI: 0, SN: 0, TF: 0, JP: 0 };
            answers.forEach((a, i) => { if (a !== undefined) dimDone[questions[i].dim]++; });
            const currentDim = questions[qIndex].dim;

            let html = '';
            dimCodes.forEach((d, i) => {
                let cls = 'dim-dot';
                if (d === currentDim) cls += ' active';
                else if (dimDone[d] >= 12) cls += ' done';
                html += `<span class="${cls}">${dimNames[i]}</span>`;
            });
            document.getElementById('dimIndicator').innerHTML = html;
        }

        function showQuestion(index) {
            const q = questions[index];
            document.getElementById('questionNum').textContent = index + 1;
            document.getElementById('questionText').textContent = "以下两种描述，哪个更像你？";
            document.getElementById('progressText').textContent = `第 ${index + 1} / ${questions.length} 题`;
            const pct = Math.round((index / questions.length) * 100);
            document.getElementById('progressPercent').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';

            updateDimIndicator(index);

            const optionsArea = document.getElementById('optionsArea');
            optionsArea.innerHTML = '';

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-binary' + (answers[index] === i ? ' selected' : '');
                div.innerHTML = `<span class="option-letter">${i === 0 ? 'A' : 'B'}</span><span class="option-text">${opt}</span>`;
                div.onclick = () => selectOption(index, i);
                optionsArea.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').textContent = index === questions.length - 1 ? '查看结果 🎉' : '下一题 →';
            document.getElementById('nextBtn').disabled = answers[index] === undefined;
            document.getElementById('autoNextHint').classList.remove('show');

            const qa = document.getElementById('questionArea');
            qa.classList.remove('fade-in');
            void qa.offsetWidth;
            qa.classList.add('fade-in');
        }

        function selectOption(qIndex, optIndex) {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            const isFirst = answers[qIndex] === undefined;
            answers[qIndex] = optIndex;
            document.querySelectorAll('.option-binary').forEach((el, i) => {
                el.className = 'option-binary' + (i === optIndex ? ' selected' : '');
            });
            document.getElementById('nextBtn').disabled = false;
            if (isFirst && qIndex < questions.length - 1) {
                document.getElementById('autoNextHint').classList.add('show');
                autoNextTimer = setTimeout(() => {
                    document.getElementById('autoNextHint').classList.remove('show');
                    nextQuestion();
                }, 500);
            }
        }

        function nextQuestion() {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            if (currentQuestion < questions.length - 1) { currentQuestion++; showQuestion(currentQuestion); }
            else showLoading();
        }

        function prevQuestion() {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            if (currentQuestion > 0) { currentQuestion--; showQuestion(currentQuestion); }
        }

        function showLoading() {
            document.getElementById('questionPage').style.display = 'none';
            document.getElementById('loadingPage').style.display = 'block';
            setTimeout(() => { calculatedResult = calculateResult(); showPaywall(); }, 2500);
        }

        function calculateResult() {
            const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

            answers.forEach((ans, i) => {
                if (ans === undefined) return;
                const q = questions[i];
                const dim = q.dim; // e.g., "EI"

                // ans=0 选了第一个选项, ans=1 选了第二个选项
                // flipped=false: options[0]=a(E/S/T/J方向), options[1]=b(I/N/F/P方向)
                // flipped=true: options[0]=b(I/N/F/P方向), options[1]=a(E/S/T/J方向)
                if (!q.flipped) {
                    if (ans === 0) scores[dim[0]]++;
                    else scores[dim[1]]++;
                } else {
                    if (ans === 0) scores[dim[1]]++;
                    else scores[dim[0]]++;
                }
            });

            const type =
                (scores.E >= scores.I ? 'E' : 'I') +
                (scores.S >= scores.N ? 'S' : 'N') +
                (scores.T >= scores.F ? 'T' : 'F') +
                (scores.J >= scores.P ? 'J' : 'P');

            const percentages = {
                EI: Math.round(scores.E / (scores.E + scores.I) * 100) || 50,
                SN: Math.round(scores.S / (scores.S + scores.N) * 100) || 50,
                TF: Math.round(scores.T / (scores.T + scores.F) * 100) || 50,
                JP: Math.round(scores.J / (scores.J + scores.P) * 100) || 50
            };

            return { type, scores, percentages, data: typeData[type] };
        }

        // ==================== 付费墙 ====================
        function showPaywall() {
            document.getElementById('loadingPage').style.display = 'none';
            const p = document.getElementById('paywallPage');
            p.style.display = 'block';
            p.classList.add('fade-in');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const result = calculatedResult;
            const buyers = Math.floor(Math.random() * 5000) + 12000;
            const colors = [result.data.color1, result.data.color2, result.data.color1, result.data.color2];

            p.innerHTML = `
                <h2>🎊 分析完成！</h2>
                <p style="color:#888;margin-bottom:20px;">你的 MBTI 人格类型已确定</p>
                <div class="paywall-preview">
                    <div class="type-preview">
                        ${result.type.split('').map((l,i) => `<span class="type-letter-preview" style="background:${colors[i]}">${l}</span>`).join('')}
                    </div>
                    <div style="font-size:1.3em;font-weight:bold;color:#6c5ce7;margin-bottom:6px;">${result.data.name}</div>
                    <div style="color:#888;font-size:0.9em;line-height:1.5;">${result.data.desc}<br>包含详细性格解读、维度分析、成长建议...</div>
                </div>
                <div class="paywall-lock">🔐</div>
                <p style="color:#555;font-weight:500;font-size:1.05em;">解锁你的完整性格报告</p>
                <div class="countdown-bar"><span>⏰ 限时特惠</span><span class="countdown-num" id="countdownTimer">14:59</span></div>
                <div class="paywall-price">
                    <span class="price-original">¥9.9</span>
                    <span class="price-current">¥0.9</span>
                    <span class="price-tag">限时特惠</span>
                </div>
                <p style="color:#aaa;font-size:0.85em;margin-bottom:16px;">已有 <strong style="color:#6c5ce7;">${buyers.toLocaleString()}</strong> 人解锁了TA的性格报告</p>
                <div class="paywall-features">
                    <div class="feature-item">你的 MBTI 类型和性格名称</div>
                    <div class="feature-item">四个维度的详细占比分析</div>
                    <div class="feature-item">核心性格特质解读</div>
                    <div class="feature-item">个人优势和成长建议</div>
                    <div class="feature-item">最佳匹配性格类型</div>
                </div>
                <button class="pay-btn" onclick="showQRCode()">💜 微信扫码支付 ¥0.9 解锁报告</button>
                <div class="paywall-guarantee">
                    <span class="guarantee-item">🔒 安全支付</span>
                    <span class="guarantee-item">⚡ 即时查看</span>
                    <span class="guarantee-item">💯 专业分析</span>
                </div>
                <p class="paywall-note">本测试仅供参考<br>如有问题请联系客服微信：your_wechat_id</p>

                <div class="qrcode-modal" id="qrcodeModal">
                    <div class="qrcode-content">
                        <button class="close-modal" onclick="closeQRCode()">×</button>
                        <h3>微信扫码支付</h3>
                        <div class="qrcode-placeholder">
                            <img src="pay-qrcode.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:8px;" onerror="this.parentElement.innerHTML='<span style=font-size:2em>📱</span>'">
                        </div>
                        <div class="modal-price">¥0.9</div>
                        <p style="color:#e17055;font-size:0.85em;font-weight:500;">⚠️ 请确认支付金额为 ¥0.9</p>
                        <div class="verify-steps">
                            <div class="step"><span class="step-num">1</span><span>扫描上方二维码</span></div>
                            <div class="step"><span class="step-num">2</span><span>确认金额 ¥0.9 并完成支付</span></div>
                            <div class="step"><span class="step-num">3</span><span>支付完成后点击下方按钮</span></div>
                        </div>
                        <div id="verifyStep1"><button class="confirm-paid-btn" onclick="startVerify()">✅ 我已完成支付</button></div>
                        <div id="verifyStep2" style="display:none;"><div class="verify-waiting" style="display:block;"><div class="wait-spinner"></div><p>正在验证支付状态...</p><p style="font-size:0.8em;color:#aaa;margin-top:8px;">预计需要 <span id="verifyCountdown">5</span> 秒</p></div></div>
                        <div id="verifyStep3" style="display:none;">
                            <div style="background:#fff3e0;border-radius:10px;padding:12px;margin:12px 0;text-align:left;"><p style="color:#e17055;font-size:0.85em;margin:0;">⚠️ 未查询到记录，请手动验证</p></div>
                            <div class="verify-input-group"><label>请输入支付金额</label><input type="text" id="payAmountInput" class="verify-input" placeholder="例如：0.90" maxlength="5" oninput="checkAmountInput()"><p class="verify-input-hint">请输入你实际支付的金额</p></div>
                            <div class="verify-input-group"><label>请输入微信昵称的第一个字</label><input type="text" id="payNicknameInput" class="verify-input" placeholder="例如：小" maxlength="2" oninput="checkAmountInput()"><p class="verify-input-hint">用于核对支付人信息</p></div>
                            <button class="confirm-paid-btn" id="finalConfirmBtn" onclick="finalConfirm()" disabled>🔓 验证并解锁结果</button>
                            <p id="verifyError" class="verify-error"></p>
                        </div>
                    </div>
                </div>
            `;
            startCountdown();
        }

        function startCountdown() {
            let t = 14 * 60 + 59;
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                t--;
                if (t <= 0) { clearInterval(countdownInterval); t = 0; }
                const el = document.getElementById('countdownTimer');
                if (el) el.textContent = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function showQRCode() {
            document.getElementById('qrcodeModal').classList.add('show');
            document.getElementById('verifyStep1').style.display = 'block';
            document.getElementById('verifyStep2').style.display = 'none';
            document.getElementById('verifyStep3').style.display = 'none';
        }

        function closeQRCode() { document.getElementById('qrcodeModal').classList.remove('show'); }

        function startVerify() {
            document.getElementById('verifyStep1').style.display = 'none';
            document.getElementById('verifyStep2').style.display = 'block';
            let sec = 5;
            const cdEl = document.getElementById('verifyCountdown');
            const timer = setInterval(() => {
                sec--;
                if (cdEl) cdEl.textContent = sec;
                if (sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('verifyStep2').style.display = 'none';
                    document.getElementById('verifyStep3').style.display = 'block';
                }
            }, 1000);
        }

        function checkAmountInput() {
            const a = document.getElementById('payAmountInput').value.trim();
            const n = document.getElementById('payNicknameInput').value.trim();
            const btn = document.getElementById('finalConfirmBtn');
            if (a.length > 0 && n.length > 0) { btn.disabled = false; btn.style.opacity = '1'; }
            else { btn.disabled = true; btn.style.opacity = '0.4'; }
            const err = document.getElementById('verifyError');
            if (err) err.style.display = 'none';
        }

        function finalConfirm() {
            const a = document.getElementById('payAmountInput').value.trim();
            const err = document.getElementById('verifyError');
            const valid = ['0.9', '0.90', '￥0.9', '￥0.90', '¥0.9', '¥0.90'];
            if (!valid.includes(a)) {
                if (err) { err.textContent = '❌ 金额不正确，请确认支付 ¥0.9 后重试'; err.style.display = 'block'; }
                return;
            }
            closeQRCode();
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('paywallPage').style.display = 'none';
            showFullResult();
        }

        // ==================== 结果页 ====================
        function showFullResult() {
            const r = calculatedResult;
            const d = r.data;
            const rp = document.getElementById('resultPage');
            rp.style.display = 'block';
            rp.classList.add('fade-in');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const colors = [d.color1, d.color2, d.color1, d.color2];
            const dimPairs = [['E 外向', 'I 内向'], ['S 实感', 'N 直觉'], ['T 思考', 'F 情感'], ['J 判断', 'P 感知']];
            const percents = [r.percentages.EI, r.percentages.SN, r.percentages.TF, r.percentages.JP];

            let dimHTML = '';
            dimPairs.forEach(([left, right], i) => {
                const lp = percents[i];
                const rpc = 100 - lp;
                dimHTML += `
                    <div class="dimension-item">
                        <div class="dim-labels">
                            <span class="dim-label-left ${lp >= 50 ? 'active' : ''}">${left} ${lp}%</span>
                            <span class="dim-label-right ${rpc > 50 ? 'active' : ''}">${right} ${rpc}%</span>
                        </div>
                        <div class="dim-bar-bg">
                            <div class="dim-bar-fill" style="width:0%;background:linear-gradient(90deg,${d.color1},${d.color2});" data-width="${lp}%"></div>
                        </div>
                    </div>`;
            });

            let traitsHTML = d.traits.map(t => `<div class="trait-item">✦ ${t}</div>`).join('');
            let compatHTML = d.compatible.map(t => `<span class="compatible-type">${t} ${typeData[t].name}</span>`).join('');

            rp.innerHTML = `
                <div class="result-type-letters">
                    ${r.type.split('').map((l,i) => `<span class="type-letter" style="background:${colors[i]}">${l}</span>`).join('')}
                </div>
                <div class="result-type-name">${r.type} · ${d.name}</div>
                <div class="result-type-title">${d.desc}</div>
                <div class="result-type-percent">全球约有 ${(Math.random()*8+2).toFixed(1)}% 的人与你是同一类型</div>

                <div class="result-card">
                    <h3>📊 四维分析</h3>
                    <div class="dimension-bars">${dimHTML}</div>
                </div>

                <div class="result-card">
                    <h3>🧩 核心特质</h3>
                    <div class="traits-grid">${traitsHTML}</div>
                </div>

                <div class="result-card">
                    <h3>💪 你的优势</h3>
                    <p>${d.strengths}</p>
                </div>

                <div class="result-card">
                    <h3>🌱 成长建议</h3>
                    <p>${d.growth}</p>
                </div>

                <div class="result-card">
                    <h3>💕 最佳匹配类型</h3>
                    <p style="margin-bottom:12px;font-size:0.95em;color:#666;">以下类型与你最为互补，容易建立深层连接：</p>
                    <div class="compatible-types">${compatHTML}</div>
                </div>

                <div class="result-warm">
                    <h3>💝 温馨寄语</h3>
                    <p>MBTI 是了解自己的一面镜子，但它不是定义你的标签。每种性格类型都有独特的光芒和价值，没有哪一种比另一种更好。希望这份报告能帮助你更好地理解自己，欣赏自己的独特之处。记住，你远比任何四个字母所能描述的更加丰富和精彩！🌟</p>
                </div>

                <button class="restart-btn" onclick="restart()">🔄 重新测试</button>
                <br>
                <button class="home-btn" onclick="location.href='/'">🏠 返回首页</button>
                <p class="share-hint">分享给朋友，看看你们的 MBTI 是否匹配 😄</p>
            `;

            setTimeout(() => {
                document.querySelectorAll('.dim-bar-fill').forEach(el => { el.style.width = el.dataset.width; });
            }, 300);
        }

        function restart() {
            currentQuestion = 0; answers = []; calculatedResult = null;
            if (countdownInterval) clearInterval(countdownInterval);
            if (autoNextTimer) clearTimeout(autoNextTimer);
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('paywallPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('questionPage').style.display === 'block') {
                if (e.key === '1' || e.key === 'a' || e.key === 'A') { const o = document.querySelectorAll('.option-binary'); if(o[0]) o[0].click(); }
                if (e.key === '2' || e.key === 'b' || e.key === 'B') { const o = document.querySelectorAll('.option-binary'); if(o[1]) o[1].click(); }
                if (e.key === 'ArrowRight' || e.key === 'Enter') { if (!document.getElementById('nextBtn').disabled) nextQuestion(); }
                if (e.key === 'ArrowLeft') { if (!document.getElementById('prevBtn').disabled) prevQuestion(); }
            }
            if (e.key === 'Escape') closeQRCode();
        });
    </script>
</body>
</html>

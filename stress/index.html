<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>压力与情绪自测 - JoyCece</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #74b9ff, #0984e3, #00cec9, #55efc4);
        }

        /* 开始页 */
        .start-page { text-align: center; padding: 30px 0; }

        .start-page .icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .start-page h1 {
            font-size: 2em;
            color: #2d3436;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .start-page .subtitle {
            color: #636e72;
            font-size: 1.05em;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .info-box {
            background: #f1f8ff;
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 28px;
            border-left: 4px solid #0984e3;
        }

        .info-box h4 {
            color: #0984e3;
            font-size: 0.95em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-box p {
            color: #636e72;
            font-size: 0.88em;
            line-height: 1.8;
        }

        .dimension-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }

        .dim-item {
            background: #f8fafd;
            border-radius: 10px;
            padding: 14px;
            text-align: left;
            border: 1px solid #e8eef5;
        }

        .dim-item .num {
            color: #0984e3;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .dim-item .name {
            color: #2d3436;
            font-size: 0.95em;
            font-weight: 500;
        }

        .start-btn {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(9,132,227,0.35);
            font-weight: 500;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(9,132,227,0.45);
        }

        .disclaimer {
            margin-top: 20px;
            color: #b2bec3;
            font-size: 0.78em;
            line-height: 1.6;
        }

        /* 进度条 */
        .progress-container { margin-bottom: 28px; }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.88em;
            color: #636e72;
        }

        .progress-bar {
            height: 6px;
            background: #e8eef5;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0984e3, #74b9ff);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .dim-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #0984e3;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.78em;
            margin-bottom: 18px;
            font-weight: 500;
        }

        /* 答题区 */
        .question-page { display: none; }

        .question-intro {
            color: #636e72;
            font-size: 0.9em;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .question-text {
            font-size: 1.15em;
            color: #2d3436;
            margin-bottom: 26px;
            line-height: 1.7;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #e8eef5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.98em;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
        }

        .option:hover {
            border-color: #74b9ff;
            background: #f8fbff;
        }

        .option.selected {
            border-color: #0984e3;
            background: #f1f8ff;
            font-weight: 500;
        }

        .option-radio {
            width: 22px;
            height: 22px;
            border: 2px solid #b2bec3;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            transition: all 0.25s;
        }

        .option.selected .option-radio {
            border-color: #0984e3;
        }

        .option.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            background: #0984e3;
            border-radius: 50%;
        }

        .option-text { flex: 1; }

        .option-score {
            color: #b2bec3;
            font-size: 0.85em;
        }

        .option.selected .option-score {
            color: #0984e3;
        }

        .auto-next-hint {
            text-align: center;
            color: #0984e3;
            font-size: 0.85em;
            margin-top: -16px;
            margin-bottom: 18px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .auto-next-hint.show { opacity: 1; }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 0.98em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-prev {
            background: #f1f5f9;
            color: #636e72;
        }

        .btn-prev:hover {
            background: #e2e8f0;
        }

        .btn-next {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            color: white;
            box-shadow: 0 4px 15px rgba(9,132,227,0.3);
        }

        .btn-next:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 加载 */
        .loading-page { display: none; text-align: center; padding: 60px 0; }

        .loading-spinner {
            width: 56px; height: 56px;
            border: 4px solid #e8eef5;
            border-top: 4px solid #0984e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: #636e72; font-size: 1.05em; }

        /* 付费墙 */
        .paywall-page { display: none; text-align: center; padding: 20px 0; }

        .paywall-page h2 {
            font-size: 1.6em;
            color: #2d3436;
            margin-bottom: 12px;
        }

        .paywall-page .subtitle {
            color: #636e72;
            margin-bottom: 24px;
            font-size: 1em;
        }

        .paywall-preview {
            background: #f1f8ff;
            border-radius: 16px;
            padding: 28px 24px;
            margin: 20px 0;
            border: 1px solid #e3f2fd;
        }

        .preview-level {
            font-size: 2em;
            font-weight: bold;
            color: #0984e3;
            margin-bottom: 8px;
        }

        .preview-desc {
            color: #636e72;
            font-size: 0.92em;
            line-height: 1.7;
        }

        .paywall-lock {
            font-size: 2.5em;
            margin: 20px 0 10px;
            color: #74b9ff;
        }

        .paywall-price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 18px 0;
        }

        .price-original {
            color: #b2bec3;
            text-decoration: line-through;
            font-size: 1em;
        }

        .price-current {
            color: #e74c3c;
            font-size: 2em;
            font-weight: bold;
        }

        .price-tag {
            background: #e74c3c;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
        }

        .paywall-features {
            text-align: left;
            background: #f8fafd;
            border-radius: 14px;
            padding: 22px;
            margin: 20px 0;
        }

        .paywall-features .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: #2d3436;
            font-size: 0.95em;
        }

        .check-icon {
            color: #0984e3;
            font-weight: bold;
            font-size: 1.1em;
        }

        .pay-btn {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            width: 100%;
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            color: white;
            box-shadow: 0 4px 15px rgba(9,132,227,0.3);
            margin: 20px 0;
        }

        .pay-btn:hover { transform: translateY(-2px); }

        .countdown-bar {
            margin: 16px 0;
            padding: 12px 16px;
            background: #fff5e6;
            border-radius: 10px;
            color: #e67e22;
            font-size: 0.92em;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .countdown-num {
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
            min-width: 70px;
        }

        .buyer-info {
            color: #95a5a6;
            font-size: 0.85em;
            margin-bottom: 16px;
        }

        .paywall-guarantee {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .guarantee-item {
            color: #95a5a6;
            font-size: 0.82em;
        }

        .paywall-note {
            color: #b2bec3;
            font-size: 0.78em;
            margin-top: 18px;
            line-height: 1.6;
        }

        /* 弹窗 */
        .qrcode-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .qrcode-modal.show { display: flex; }

        .qrcode-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            max-width: 380px;
            width: 92%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .qrcode-content h3 {
            margin-bottom: 16px;
            color: #2d3436;
            font-size: 1.2em;
        }

        .qrcode-content p {
            color: #636e72;
            font-size: 0.9em;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .qrcode-placeholder {
            width: 220px; height: 220px;
            background: #f8fafd;
            border: 2px solid #e8eef5;
            border-radius: 12px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #b2bec3;
        }

        .modal-price {
            color: #e74c3c;
            font-size: 1.4em;
            font-weight: bold;
            margin: 4px 0;
        }

        .verify-steps {
            background: #f1f8ff;
            border-radius: 10px;
            padding: 14px;
            margin: 14px 0;
            text-align: left;
        }

        .verify-steps .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 5px 0;
            font-size: 0.85em;
            color: #2d3436;
            line-height: 1.5;
        }

        .verify-steps .step-num {
            background: #0984e3;
            color: white;
            min-width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 2px;
        }

        .verify-input-group { margin: 14px 0; }

        .verify-input-group label {
            display: block;
            color: #2d3436;
            font-size: 0.88em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .verify-input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e8eef5;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .verify-input:focus { border-color: #0984e3; }

        .verify-input-hint {
            color: #b2bec3;
            font-size: 0.75em;
            margin-top: 4px;
        }

        .confirm-paid-btn {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .confirm-paid-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .confirm-paid-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .verify-error {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
        }

        .verify-waiting {
            color: #0984e3;
            font-size: 0.95em;
            padding: 20px;
            text-align: center;
        }

        .verify-waiting .wait-spinner {
            width: 30px; height: 30px;
            border: 3px solid #e8eef5;
            border-top: 3px solid #0984e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        /* 结果页 */
        .result-page { display: none; }

        .result-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .result-level-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            font-size: 2em;
            color: white;
            margin-bottom: 16px;
        }

        .result-score {
            font-size: 2.5em;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 4px;
        }

        .result-score .total {
            color: #95a5a6;
            font-size: 0.5em;
            font-weight: normal;
        }

        .result-level {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-desc {
            color: #636e72;
            font-size: 0.95em;
            line-height: 1.7;
        }

        .result-card {
            background: #f8fafd;
            border-radius: 16px;
            padding: 26px;
            margin-bottom: 20px;
            border: 1px solid #e8eef5;
        }

        .result-card h3 {
            color: #2d3436;
            margin-bottom: 16px;
            font-size: 1.1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card p {
            color: #2d3436;
            line-height: 1.9;
            font-size: 0.95em;
        }

        .dimension-analysis {
            margin-top: 16px;
        }

        .dim-detail {
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #e8eef5;
        }

        .dim-detail:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .dim-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .dim-detail-name {
            color: #2d3436;
            font-weight: 600;
            font-size: 0.95em;
        }

        .dim-detail-score {
            color: #0984e3;
            font-weight: bold;
            font-size: 0.95em;
        }

        .dim-detail-bar {
            height: 8px;
            background: #e8eef5;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .dim-detail-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 1.5s ease;
        }

        .dim-detail-desc {
            color: #636e72;
            font-size: 0.85em;
            line-height: 1.6;
        }

        .advice-list {
            list-style: none;
            padding: 0;
            margin-top: 12px;
        }

        .advice-list li {
            padding: 10px 0 10px 30px;
            color: #2d3436;
            line-height: 1.7;
            font-size: 0.93em;
            position: relative;
        }

        .advice-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 18px;
            width: 18px;
            height: 2px;
            background: #0984e3;
        }

        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #f39c12;
            border-radius: 10px;
            padding: 18px;
            margin-top: 16px;
        }

        .warning-box .warning-title {
            color: #d68910;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .warning-box p {
            color: #6c5500;
            font-size: 0.88em;
            line-height: 1.7;
        }

        .restart-btn {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
        }

        .home-btn {
            background: none;
            border: 2px solid #74b9ff;
            color: #0984e3;
            padding: 12px 32px;
            font-size: 0.95em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: #f1f8ff;
        }

        .button-center {
            text-align: center;
            margin-top: 20px;
        }

        .fade-in { animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .start-page h1 { font-size: 1.6em; }
            .question-text { font-size: 1.05em; }
            .btn-group { flex-direction: column; }
            .dimension-grid { grid-template-columns: 1fr; }
            .result-score { font-size: 2em; }
            .paywall-guarantee { gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页 -->
        <div class="start-page" id="startPage">
            <div class="icon">🌊</div>
            <h1>压力与情绪自测</h1>
            <p class="subtitle">了解你当前的压力水平<br>获取科学的调节建议</p>

            <div class="info-box">
                <h4>关于这个测试</h4>
                <p>本测试参考国际通用的 DASS-21 与 PSS-10 量表设计，从身体、情绪、思维和生活四个维度评估你最近一个月的压力状况，并提供针对性的建议。</p>
            </div>

            <div class="dimension-grid">
                <div class="dim-item">
                    <div class="num">维度 1</div>
                    <div class="name">身体压力</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 2</div>
                    <div class="name">情绪状态</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 3</div>
                    <div class="name">思维认知</div>
                </div>
                <div class="dim-item">
                    <div class="num">维度 4</div>
                    <div class="name">生活功能</div>
                </div>
            </div>

            <p style="color:#636e72;font-size:0.9em;margin-bottom:24px;line-height:1.6;">
                共 20 道题目，预计用时 5 分钟<br>
                请根据最近一个月的真实情况作答
            </p>

            <button class="start-btn" onclick="startQuiz()">开始测试</button>

            <p class="disclaimer">
                本测试仅供自我了解和参考<br>
                不能替代专业的心理诊断和治疗
            </p>
        </div>

        <!-- 答题页 -->
        <div class="question-page" id="questionPage">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">第 1 / 20 题</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div id="questionArea" class="fade-in">
                <span class="dim-tag" id="dimTag">身体压力</span>
                <p class="question-intro">最近一个月，你是否：</p>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsArea"></div>
                <div class="auto-next-hint" id="autoNextHint">已选择，正在跳转下一题...</div>
            </div>

            <div class="btn-group">

        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

            const byDim = { body: [], emotion: [], cognition: [], function: [] };
            questionsRaw.forEach(q => byDim[q.dim].push(q));

            // 每个维度内部打乱
            Object.keys(byDim).forEach(d => { byDim[d] = shuffleArray(byDim[d]); });

            // 按维度顺序拼接（先身体，再情绪，再认知，最后功能）
            questions = [
                ...byDim.body,
                ...byDim.emotion,
                ...byDim.cognition,
                ...byDim.function
            ];
        }

            const optionsArea = document.getElementById('optionsArea');

            const optionsData = [

                { text: "偶尔有", score: 1 },
                { text: "经常有", score: 2 },
                { text: "几乎总是", score: 3 }
            ];

            optionsData.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (answers[idx] === i ? ' selected' : '');
                div.innerHTML = `<div class="option-radio"></div><div class="option-text">${opt.text}</div>`;
                div.onclick = () => selectOption(idx, i);
                optionsArea.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? '查看结果' : '下一题';
            document.getElementById('nextBtn').disabled = answers[idx] === undefined;
            document.getElementById('autoNextHint').classList.remove('show');

            const qa = document.getElementById('questionArea');
            qa.classList.remove('fade-in');
            void qa.offsetWidth;
            qa.classList.add('fade-in');
        }

        function selectOption(qIdx, optIdx) {
            if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
            const isFirst = answers[qIdx] === undefined;
            answers[qIdx] = optIdx;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.className = 'option' + (i === optIdx ? ' selected' : '');
            });
            document.getElementById('nextBtn').disabled = false;
            if (isFirst && qIdx < questions.length - 1) {
                document.getElementById('autoNextHint').classList.add('show');
                autoNextTimer = setTimeout(() => {
                    document.getElementById('autoNextHint').classList.remove('show');
                    nextQuestion();

            let level;
            if (totalScore <= 15) level = 'normal';
            else if (totalScore <= 30) level = 'mild';
            else if (totalScore <= 45) level = 'moderate';
            else level = 'severe';

            // 各维度得分百分比
            const dimPercents = {};
            Object.keys(dimScores).forEach(d => {
                dimPercents[d] = Math.round(dimScores[d] / dimMax[d] * 100);

            return { totalScore, totalMax, level, dimScores, dimPercents, data: levelData[level] };

                if (t <= 0) { clearInterval(countdownInterval); t = 0; }
                const el = document.getElementById('countdownTimer');
                if (el) el.textContent = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function showQRCode() {
            document.getElementById('qrcodeModal').classList.add('show');
            document.getElementById('verifyStep1').style.display = 'block';
            document.getElementById('verifyStep2').style.display = 'none';
            document.getElementById('verifyStep3').style.display = 'none';
        }

        function closeQRCode() {
            document.getElementById('qrcodeModal').classList.remove('show');
        }

        function startVerify() {
            document.getElementById('verifyStep1').style.display = 'none';
            document.getElementById('verifyStep2').style.display = 'block';
            let sec = 5;
            const cdEl = document.getElementById('verifyCountdown');
            const timer = setInterval(() => {
                sec--;
                if (cdEl) cdEl.textContent = sec;
                if (sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('verifyStep2').style.display = 'none';
                    document.getElementById('verifyStep3').style.display = 'block';
                }
            }, 1000);
        }

        function checkInput() {
            const a = document.getElementById('payAmountInput').value.trim();
            const n = document.getElementById('payNicknameInput').value.trim();
            const btn = document.getElementById('finalConfirmBtn');
            if (a.length > 0 && n.length > 0) {
                btn.disabled = false;
                btn.style.opacity = '1';
            } else {
                btn.disabled = true;
                btn.style.opacity = '0.4';
            }
            const err = document.getElementById('verifyError');
            if (err) err.style.display = 'none';
        }

        function finalConfirm() {
            const a = document.getElementById('payAmountInput').value.trim();
            const err = document.getElementById('verifyError');
            if (!['0.9', '0.90', '￥0.9', '￥0.90', '¥0.9', '¥0.90'].includes(a)) {
                if (err) {
                    err.textContent = '金额不正确，请确认支付 ¥0.9 后重试';
                    err.style.display = 'block';
                }
                return;
            }
            closeQRCode();
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('paywallPage').style.display = 'none';
            showFullResult();
        }

        // ==================== 结果页 ====================
        function showFullResult() {
            const r = calculatedResult;
            const d = r.data;
            const rp = document.getElementById('resultPage');
            rp.style.display = 'block';
            rp.classList.add('fade-in');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const dimOrder = ['body', 'emotion', 'cognition', 'function'];
            const dimColors = ['#3498db', '#9b59b6', '#1abc9c', '#f39c12'];

            let dimHTML = '';
            dimOrder.forEach((dim, i) => {
                const pct = r.dimPercents[dim];
                dimHTML += `
                    <div class="dim-detail">
                        <div class="dim-detail-header">
                            <span class="dim-detail-name">${dimNames[dim]}</span>
                            <span class="dim-detail-score" style="color:${dimColors[i]}">${pct}%</span>
                        </div>
                        <div class="dim-detail-bar">
                            <div class="dim-detail-fill" style="width:0%;background:${dimColors[i]};" data-width="${pct}%"></div>
                        </div>
                        <div class="dim-detail-desc">${d.analysis[dim]}</div>
                    </div>
                `;
            });

            const adviceHTML = d.advice.map(a => `<li>${a}</li>`).join('');
            const warningHTML = d.warning ? `
                <div class="warning-box">
                    <div class="warning-title">重要提醒</div>
                    <p>${d.warning}</p>
                </div>
            ` : '';

            rp.innerHTML = `
                <div class="result-header">
                    <div class="result-level-icon" style="background:${d.color}">${d.icon}</div>
                    <div class="result-score">${r.totalScore}<span class="total"> / ${r.totalMax}</span></div>
                    <div class="result-level" style="color:${d.color}">${d.name}</div>
                    <div class="result-desc">${d.desc}</div>
                </div>

                <div class="result-card">
                    <h3>整体评估</h3>
                    <p>${d.summary}</p>
                </div>

                <div class="result-card">
                    <h3>四维度分析</h3>
                    <div class="dimension-analysis">${dimHTML}</div>
                </div>

                <div class="result-card">
                    <h3>给你的建议</h3>
                    <ul class="advice-list">${adviceHTML}</ul>
                    ${warningHTML}
                </div>

                <div class="result-card" style="background:#f1f8ff;border-color:#d0e7ff;">
                    <h3>关于压力的科学认知</h3>
                    <p>压力本身并不可怕，它是身体应对挑战的自然反应。适度的压力可以帮助我们集中注意力、提高效率。但当压力长期积累、超出承受范围时，就需要主动调节。请记住，关注自己的心理健康是一种成熟和负责任的表现，而不是软弱。每个人都值得被温柔以待，包括你自己。</p>
                </div>

                <div class="button-center">
                    <button class="restart-btn" onclick="restart()">重新测试</button>
                    <br>
                    <button class="home-btn" onclick="location.href='/'">返回首页</button>
                </div>

                <p style="text-align:center;margin-top:20px;color:#b2bec3;font-size:0.82em;line-height:1.6;">
                    本报告基于自我评估，仅供参考<br>
                    如需专业诊断，请咨询心理咨询师或精神科医生
                </p>
            `;

            setTimeout(() => {
                document.querySelectorAll('.dim-detail-fill').forEach(el => {
                    el.style.width = el.dataset.width;
                });
            }, 300);
        }

        function restart() {
            currentQuestion = 0;
            answers = [];
            calculatedResult = null;
            if (countdownInterval) clearInterval(countdownInterval);
            if (autoNextTimer) clearTimeout(autoNextTimer);
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('paywallPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('questionPage').style.display === 'block') {
                if (e.key >= '1' && e.key <= '4') {
                    const i = parseInt(e.key) - 1;
                    const o = document.querySelectorAll('.option');
                    if (o[i]) o[i].click();
                }
                if (e.key === 'ArrowRight' || e.key === 'Enter') {
                    if (!document.getElementById('nextBtn').disabled) nextQuestion();
                }
                if (e.key === 'ArrowLeft') {
                    if (!document.getElementById('prevBtn').disabled) prevQuestion();
                }
            }
            if (e.key === 'Escape') closeQRCode();
        });
    </script>
</body>
</html>
